<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙 Wizard Search - AI-Powered Search Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a14;
            --bg-secondary: #0f0f1c;
            --bg-card: rgba(18,18,35,0.95);
            --text-primary: #ffffff;
            --text-secondary: #e0e0ff;
            --text-muted: #a0a0c0;
            --border: rgba(139,92,246,0.3);
            --primary: #a855f7;
            --primary-dark: #7c3aed;
            --primary-light: #c084fc;
            --primary-glow: rgba(168,85,247,0.3);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, var(--primary-glow) 0%, transparent 50%);
            opacity: 0.3;
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.05); }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
        }
        
        .wizard-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px var(--primary));
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        /* Search Box */
        .search-container {
            max-width: 800px;
            margin: 0 auto 40px;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 60px;
            padding: 8px 8px 8px 24px;
            transition: all 0.3s ease;
        }
        
        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 25px var(--primary-glow);
        }
        
        .search-icon {
            font-size: 20px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }
        
        .search-input {
            flex: 1;
            background: none;
            border: none;
            padding: 14px 0;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }
        
        .search-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        
        /* Suggestions Dropdown */
        .suggestions-dropdown {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-top: 8px;
            max-height: 350px;
            overflow-y: auto;
            display: none;
        }
        
        .suggestions-dropdown.show {
            display: block;
        }
        
        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
        }
        
        .suggestion-item:hover {
            background: rgba(139, 92, 246, 0.1);
            padding-left: 28px;
        }
        
        .suggestion-icon {
            font-size: 16px;
        }
        
        .suggestion-text {
            flex: 1;
        }
        
        /* Results */
        .results-area {
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        
        .result-card:hover {
            background: rgba(139, 92, 246, 0.08);
            transform: translateX(5px);
            border-color: var(--primary);
        }
        
        .result-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-light);
            margin-bottom: 8px;
        }
        
        .result-url {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
            word-break: break-all;
        }
        
        .result-snippet {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        .source-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(139, 92, 246, 0.15);
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
            color: var(--primary-light);
        }
        
        /* Loading State */
        .loading-spinner {
            text-align: center;
            padding: 60px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .no-results-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid var(--border);
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 12px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .search-box { flex-wrap: wrap; }
            .search-btn { width: 100%; }
            .result-title { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <div class="header">
            <div class="wizard-icon">🧙</div>
            <h1>Wizard Search</h1>
            <p class="subtitle">AI-powered search with real, clickable results</p>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input" placeholder="Search the web..." autocomplete="off">
                <button id="search-btn" class="search-btn">Search</button>
            </div>
            <div id="suggestions" class="suggestions-dropdown"></div>
        </div>
        
        <div id="results" class="results-area"></div>
        
        <div class="footer">
            <p>🧙 Wizard Search • Real clickable results • Powered by Brave + DuckDuckGo</p>
            <p style="margin-top: 8px;">Search privately, get actual links</p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://arnav0928.pythonanywhere.com';
        let searchTimeout = null;
        let currentQuery = '';
        
        // Get query from URL
        function getQueryFromURL() {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                document.getElementById('search-input').value = decodeURIComponent(q);
                performSearch();
            }
        }
        
        // Perform search via backend
        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            
            currentQuery = query;
            
            // Update URL without reload
            const newUrl = `${window.location.pathname}?q=${encodeURIComponent(query)}`;
            window.history.pushState({}, '', newUrl);
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><div>🧙 Wizard is searching...</div></div>';
            document.getElementById('suggestions').classList.remove('show');
            
            try {
                const response = await fetch(`${API_BASE}/api/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ query: query })
                });
                
                const data = await response.json();
                
                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Search failed');
                }
                
                renderResults(data);
                
            } catch (error) {
                console.error('Search error:', error);
                resultsDiv.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">⚠️</div>
                        <h3>Search Error</h3>
                        <p>${escapeHtml(error.message)}</p>
                        <button onclick="performSearch()" style="background: var(--primary); border: none; border-radius: 20px; padding: 10px 20px; color: white; margin-top: 20px; cursor: pointer;">Try Again</button>
                    </div>
                `;
            }
        }
        
        // Render search results
        function renderResults(data) {
            const resultsDiv = document.getElementById('results');
            
            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <h3>No results found for "${escapeHtml(data.query)}"</h3>
                        <p>Try a different search term.</p>
                    </div>
                `;
                return;
            }
            
            let html = `<div class="source-badge">✨ ${data.results.length} results from ${data.source}</div>`;
            
            for (const result of data.results) {
                html += `
                    <div class="result-card" onclick="window.open('${escapeHtml(result.url)}', '_blank')">
                        <div class="result-title">${escapeHtml(result.title)}</div>
                        <div class="result-url">${escapeHtml(result.url)}</div>
                        <div class="result-snippet">${escapeHtml(result.snippet)}</div>
                    </div>
                `;
            }
            
            resultsDiv.innerHTML = html;
        }
        
        // Get search suggestions (via backend to avoid CORS)
        async function getSuggestions(query) {
            if (!query || query.length < 2) {
                document.getElementById('suggestions').classList.remove('show');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/search/suggest?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                const suggestionsDiv = document.getElementById('suggestions');
                if (!suggestionsDiv) return;
                
                if (data.suggestions && data.suggestions.length > 0) {
                    suggestionsDiv.innerHTML = data.suggestions.map(s => `
                        <div class="suggestion-item" data-query="${escapeHtml(s)}">
                            <span class="suggestion-icon">🔍</span>
                            <span class="suggestion-text">${escapeHtml(s)}</span>
                        </div>
                    `).join('');
                    
                    suggestionsDiv.classList.add('show');
                    
                    // Add click handlers
                    document.querySelectorAll('.suggestion-item').forEach(item => {
                        item.onclick = () => {
                            const query = item.dataset.query;
                            document.getElementById('search-input').value = query;
                            suggestionsDiv.classList.remove('show');
                            performSearch();
                        };
                    });
                } else {
                    suggestionsDiv.classList.remove('show');
                }
            } catch (error) {
                console.error('Suggestions error:', error);
                document.getElementById('suggestions').classList.remove('show');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Event listeners
        document.getElementById('search-input').addEventListener('input', (e) => {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => getSuggestions(e.target.value), 300);
        });
        
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('suggestions').classList.remove('show');
                performSearch();
            }
        });
        
        document.getElementById('search-btn').addEventListener('click', () => {
            document.getElementById('suggestions').classList.remove('show');
            performSearch();
        });
        
        // Close suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-box') && !e.target.closest('.suggestions-dropdown')) {
                document.getElementById('suggestions').classList.remove('show');
            }
        });
        
        // Initialize
        getQueryFromURL();
    </script>
</body>
</html>
