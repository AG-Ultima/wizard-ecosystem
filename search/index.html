<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙 Wizard Search - AI-Powered Search Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a14;
            --bg-secondary: #0f0f1c;
            --bg-card: rgba(18,18,35,0.95);
            --text-primary: #ffffff;
            --text-secondary: #e0e0ff;
            --text-muted: #a0a0c0;
            --border: rgba(139,92,246,0.3);
            --primary: #a855f7;
            --primary-dark: #7c3aed;
            --primary-light: #c084fc;
            --primary-glow: rgba(168,85,247,0.3);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, var(--primary-glow) 0%, transparent 50%);
            opacity: 0.3;
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.05); }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        
        .header {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .logo-icon { font-size: 32px; animation: float 3s ease-in-out infinite; }
        .logo-text {
            font-size: 20px; font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .ecosystem-nav { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .nav-item {
            background: rgba(139,92,246,0.1);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .nav-item:hover { background: rgba(139,92,246,0.25); transform: translateY(-2px); border-color: var(--primary); }
        .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-color: transparent; }
        .nav-icon { font-size: 18px; }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(139,92,246,0.15);
            padding: 6px 16px;
            border-radius: 40px;
        }
        .user-avatar {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .user-email { font-size: 12px; color: var(--primary-light); }
        .logout-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; }
        .login-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }
        
        .search-hero { text-align: center; padding: 40px 20px; }
        .wizard-icon { font-size: 80px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 30px var(--primary)); }
        h1 { font-size: 48px; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .subtitle { color: var(--text-muted); font-size: 18px; margin-bottom: 30px; }
        
        .search-container { max-width: 800px; margin: 0 auto 40px; }
        .search-box {
            display: flex;
            gap: 12px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 60px;
            padding: 8px 8px 8px 24px;
            transition: all 0.3s ease;
        }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 25px var(--primary-glow); }
        .search-icon { font-size: 20px; color: var(--text-muted); display: flex; align-items: center; }
        .search-input {
            flex: 1;
            background: none;
            border: none;
            padding: 14px 0;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }
        .search-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .search-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary-glow); }
        
        .ai-summary {
            background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(0,0,0,0.3));
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 30px;
            border-left: 4px solid var(--primary);
        }
        .summary-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .summary-icon { font-size: 28px; }
        .summary-title { font-size: 18px; font-weight: 600; color: var(--primary-light); }
        .summary-text { line-height: 1.7; color: var(--text-secondary); font-size: 15px; }
        
        .results-area { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .result-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        .result-card:hover { background: rgba(139,92,246,0.08); transform: translateX(5px); border-color: var(--primary); }
        .result-title { font-size: 18px; font-weight: 600; color: var(--primary-light); margin-bottom: 8px; }
        .result-url { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; word-break: break-all; }
        .result-snippet { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
        .source-badge { display: inline-block; padding: 4px 12px; background: rgba(139,92,246,0.15); border-radius: 20px; font-size: 12px; margin-bottom: 20px; color: var(--primary-light); }
        
        .loading-spinner { text-align: center; padding: 60px; }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(139,92,246,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .no-results { text-align: center; padding: 60px; color: var(--text-muted); }
        .no-results-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        
        .footer { text-align: center; padding: 30px; border-top: 1px solid var(--border); margin-top: 60px; color: var(--text-muted); font-size: 12px; }
        
        .login-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-modal.hidden { display: none; }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            width: 420px;
            text-align: center;
        }
        .login-card input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: white;
            margin-bottom: 15px;
        }
        .login-card button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .switch-mode { background: none !important; color: var(--primary) !important; margin-top: 15px; }
        
        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .header { flex-direction: column; text-align: center; }
            .ecosystem-nav { justify-content: center; }
            .search-box { flex-wrap: wrap; }
            .search-btn { width: 100%; }
            .result-title { font-size: 16px; }
            .login-card { width: 90%; padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <div class="header">
            <div class="logo" onclick="window.location.href='https://wizardecosystem.dpdns.org'">
                <span class="logo-icon">🧙</span>
                <span class="logo-text">Wizard Ecosystem</span>
            </div>
            
            <div class="ecosystem-nav">
                <div class="nav-item" onclick="window.location.href='https://wizardai.dpdns.org'">
                    <span class="nav-icon">🧠</span>
                    <span>Wizard AI</span>
                </div>
                <div class="nav-item active" onclick="window.location.href='https://wizardecosystem.dpdns.org/search'">
                    <span class="nav-icon">🔍</span>
                    <span>Search</span>
                </div>
                <div class="nav-item" onclick="window.location.href='https://wizardecosystem.dpdns.org/mail'">
                    <span class="nav-icon">📧</span>
                    <span>Mail</span>
                </div>
                <div class="nav-item" onclick="window.location.href='https://wizardecosystem.dpdns.org/calendar'">
                    <span class="nav-icon">📅</span>
                    <span>Calendar</span>
                </div>
                <div class="nav-item" onclick="window.location.href='https://wizardecosystem.dpdns.org/chat'">
                    <span class="nav-icon">💬</span>
                    <span>Chat</span>
                </div>
            </div>
            
            <div id="user-info" class="user-info" style="display: none;">
                <div class="user-avatar">🧙</div>
                <span id="user-email" class="user-email"></span>
                <button id="logout-btn" class="logout-btn">🚪</button>
            </div>
            <button id="login-btn" class="login-btn" style="display: none;">Sign In</button>
        </div>
        
        <div class="search-hero">
            <div class="wizard-icon">🧙</div>
            <h1>Wizard Search</h1>
            <p class="subtitle">AI-powered search with real, clickable results</p>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input" placeholder="Search the web..." autocomplete="off">
                <button id="search-btn" class="search-btn">Search</button>
            </div>
        </div>
        
        <div id="results" class="results-area"></div>
        
        <div class="footer">
            <p>🧙 Wizard Search • Real clickable results • Powered by Brave + DuckDuckGo</p>
            <p style="margin-top: 8px;">AI summaries powered by Llama 4 • Instant search results</p>
        </div>
    </div>
    
    <div id="login-modal" class="login-modal hidden">
        <div class="login-card">
            <div style="font-size: 60px; margin-bottom: 20px;">🧙</div>
            <h2 style="margin-bottom: 20px;">Sign In</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <div id="login-error" style="color: #ef4444; font-size: 12px; margin-bottom: 10px;"></div>
            <button id="login-submit">Login</button>
            <button id="show-signup" class="switch-mode">Create an account →</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://arnav0928.pythonanywhere.com';
        let currentUser = null;
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showNotification(msg, isError = false) {
            const n = document.createElement('div');
            n.textContent = msg;
            n.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:${isError ? '#ef4444' : 'linear-gradient(135deg, #a855f7, #7c3aed)'};border-radius:50px;padding:12px 24px;color:white;z-index:10000;`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        // ========== AUTH ==========
        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/api/check-auth`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated && data.user) {
                        currentUser = data.user;
                        document.getElementById('user-info').style.display = 'flex';
                        document.getElementById('user-email').textContent = currentUser.email;
                        document.getElementById('login-btn').style.display = 'none';
                        return;
                    }
                }
            } catch(e) {}
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('login-btn').style.display = 'block';
        }
        
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const errorDiv = document.getElementById('login-error');
            if (!email || !password) { errorDiv.textContent = 'Email and password required'; return; }
            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser = data.user;
                    document.getElementById('login-modal').classList.add('hidden');
                    document.getElementById('user-info').style.display = 'flex';
                    document.getElementById('user-email').textContent = currentUser.email;
                    document.getElementById('login-btn').style.display = 'none';
                    showNotification('Welcome back!');
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                }
            } catch(e) { errorDiv.textContent = 'Connection error'; }
        }
        
        async function handleLogout() {
            await fetch(`${API_BASE}/api/logout`, { method: 'POST', credentials: 'include' });
            currentUser = null;
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('login-btn').style.display = 'block';
            showNotification('Logged out');
        }
        
        // ========== DIRECT SEARCH (No proxy - Brave JSON API) ==========
        
        // Brave Search API (unofficial but works - returns JSON)
        async function searchBrave(query) {
            try {
                // Brave's internal search API (returns JSON)
                const url = `https://search.brave.com/api/search?q=${encodeURIComponent(query)}&source=web&count=15`;
                
                const response = await fetch(url, {
                    headers: {
                        'Accept': 'application/json',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });
                
                if (!response.ok) return null;
                
                const data = await response.json();
                const results = [];
                
                if (data && data.results) {
                    for (const result of data.results) {
                        if (result.url && result.title) {
                            results.push({
                                title: result.title,
                                url: result.url,
                                snippet: result.description || result.title
                            });
                        }
                    }
                }
                
                return results.length > 0 ? results : null;
            } catch (e) {
                console.log('Brave API error:', e);
                return null;
            }
        }
        
        // DuckDuckGo Instant Answer API (returns JSON, no CORS issues)
        async function searchDuckDuckGo(query) {
            try {
                const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                const response = await fetch(url);
                
                if (!response.ok) return null;
                
                const data = await response.json();
                const results = [];
                
                // Add Abstract if available
                if (data.Abstract && data.AbstractURL) {
                    results.push({
                        title: data.Heading || data.Abstract,
                        url: data.AbstractURL,
                        snippet: data.Abstract
                    });
                }
                
                // Add Related Topics
                if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                    for (const topic of data.RelatedTopics) {
                        if (topic.Text && topic.FirstURL) {
                            results.push({
                                title: topic.Text.split(' - ')[0] || topic.Text.substring(0, 100),
                                url: topic.FirstURL,
                                snippet: topic.Text
                            });
                        }
                        if (results.length >= 12) break;
                    }
                }
                
                return results.length > 0 ? results : null;
            } catch (e) {
                console.log('DuckDuckGo API error:', e);
                return null;
            }
        }
        
        // Get AI summary for the query
        async function getAISummary(query) {
            try {
                const response = await fetch(`${API_BASE}/api/chat/simple`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        prompt: `Explain what "${query}" means in 2-3 simple, friendly sentences. Make it educational and helpful. Be concise.`,
                        mode: 'Fast'
                    })
                });
                const data = await response.json();
                return data.response || null;
            } catch (e) {
                console.log('AI summary error:', e);
                return null;
            }
        }
        
        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) {
                showNotification('Please enter a search term', true);
                return;
            }
            
            const newUrl = `${window.location.pathname}?q=${encodeURIComponent(query)}`;
            window.history.pushState({}, '', newUrl);
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><div>🧙 Searching the web...</div></div>';
            
            console.log('🔍 Searching for:', query);
            
            // Get AI summary in background
            let summary = null;
            getAISummary(query).then(s => {
                summary = s;
                // Re-render if results are already showing
                const currentResults = resultsDiv.querySelector('.source-badge');
                if (currentResults && summary) {
                    const summaryDiv = resultsDiv.querySelector('.ai-summary');
                    if (summaryDiv) {
                        summaryDiv.querySelector('.summary-text').innerHTML = escapeHtml(summary);
                    }
                }
            });
            
            // Try Brave Search first
            let results = await searchBrave(query);
            let source = 'Brave Search';
            
            // Fallback to DuckDuckGo if Brave fails
            if (!results || results.length === 0) {
                console.log('Brave failed, trying DuckDuckGo...');
                results = await searchDuckDuckGo(query);
                source = 'DuckDuckGo';
            }
            
            // Render results
            let html = '';
            
            // Add AI Summary placeholder (will update when available)
            html += `
                <div class="ai-summary">
                    <div class="summary-header">
                        <span class="summary-icon">🧙</span>
                        <span class="summary-title">About "${escapeHtml(query)}"</span>
                    </div>
                    <div class="summary-text">${summary ? escapeHtml(summary) : '<span style="opacity: 0.7;">✨ Getting AI explanation...</span>'}</div>
                </div>
            `;
            
            if (!results || results.length === 0) {
                html += `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <h3>No results found for "${escapeHtml(query)}"</h3>
                        <p>Try a different search term.</p>
                        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px;">
                            <button onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(query)}', '_blank')" style="background: #4285f4; border: none; border-radius: 20px; padding: 10px 20px; color: white; cursor: pointer;">🔍 Google</button>
                            <button onclick="window.open('https://duckduckgo.com/?q=${encodeURIComponent(query)}', '_blank')" style="background: #de5833; border: none; border-radius: 20px; padding: 10px 20px; color: white; cursor: pointer;">🦆 DuckDuckGo</button>
                        </div>
                    </div>
                `;
                resultsDiv.innerHTML = html;
                return;
            }
            
            html += `<div class="source-badge">✨ ${results.length} results from ${source}</div>`;
            
            for (const result of results) {
                html += `
                    <div class="result-card" onclick="window.open('${escapeHtml(result.url)}', '_blank')">
                        <div class="result-title">${escapeHtml(result.title)}</div>
                        <div class="result-url">${escapeHtml(result.url)}</div>
                        <div class="result-snippet">${escapeHtml(result.snippet)}</div>
                    </div>
                `;
            }
            
            resultsDiv.innerHTML = html;
            
            // Update summary if it just arrived
            if (summary) {
                const summaryDiv = resultsDiv.querySelector('.ai-summary .summary-text');
                if (summaryDiv && summaryDiv.innerHTML.includes('Getting AI explanation')) {
                    summaryDiv.innerHTML = escapeHtml(summary);
                }
            } else {
                // Poll for summary
                const checkSummary = setInterval(async () => {
                    if (summary) {
                        const summaryDiv = resultsDiv.querySelector('.ai-summary .summary-text');
                        if (summaryDiv) {
                            summaryDiv.innerHTML = escapeHtml(summary);
                            clearInterval(checkSummary);
                        }
                    } else if (!summary) {
                        const newSummary = await getAISummary(query);
                        if (newSummary) {
                            summary = newSummary;
                            const summaryDiv = resultsDiv.querySelector('.ai-summary .summary-text');
                            if (summaryDiv) {
                                summaryDiv.innerHTML = escapeHtml(summary);
                                clearInterval(checkSummary);
                            }
                        }
                    }
                }, 500);
                setTimeout(() => clearInterval(checkSummary), 10000);
            }
        }
        
        function getQueryFromURL() {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                document.getElementById('search-input').value = decodeURIComponent(q);
                performSearch();
            }
        }
        
        // ========== EVENT LISTENERS ==========
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
        
        document.getElementById('search-btn').addEventListener('click', () => {
            performSearch();
        });
        
        document.getElementById('login-btn').addEventListener('click', () => {
            document.getElementById('login-modal').classList.remove('hidden');
        });
        
        document.getElementById('login-submit').addEventListener('click', handleLogin);
        document.getElementById('logout-btn').addEventListener('click', handleLogout);
        document.getElementById('show-signup').addEventListener('click', () => {
            window.location.href = 'https://wizardecosystem.dpdns.org';
        });
        
        document.getElementById('login-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('login-modal')) {
                document.getElementById('login-modal').classList.add('hidden');
            }
        });
        
        // Initialize
        checkAuth();
        getQueryFromURL();
    </script>
</body>
</html>
