<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wizard Search — AI-powered web search with real, clickable results and intelligent summaries. Part of the Wizard Ecosystem by Arnav Gupta.">
    <meta name="keywords" content="Wizard Search, AI search engine, web search, AI summary, Wizard Ecosystem">
    <meta name="author" content="Arnav Gupta">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#080612">
    <meta property="og:title" content="Wizard Search — AI-Powered Web Search">
    <meta property="og:description" content="Real, clickable web results with AI-generated summaries. Part of the Wizard Ecosystem.">
    <meta property="og:url" content="https://wizardecosystem.dpdns.org/search">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Wizard Search — AI-Powered Web Search">
    <link rel="canonical" href="https://wizardecosystem.dpdns.org/search">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Wizard Search",
      "url": "https://wizardecosystem.dpdns.org/search",
      "description": "AI-powered web search with real clickable results and intelligent summaries.",
      "applicationCategory": "SearchApplication",
      "author": { "@type": "Person", "name": "Arnav Gupta" }
    }
    </script>

    <title>Wizard Search — AI-Powered Web Search</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink:           #080612;
            --ink-2:         #0e0b1e;
            --ink-3:         #13102a;
            --ink-4:         #1a1635;
            --gold:          #c9a84c;
            --gold-light:    #e8c97a;
            --gold-dim:      rgba(201,168,76,0.12);
            --gold-glow:     rgba(201,168,76,0.22);
            --violet:        #7c5cbf;
            --violet-dim:    rgba(124,92,191,0.2);
            --silver:        #d4d0e8;
            --silver-dim:    rgba(212,208,232,0.5);
            --muted:         rgba(212,208,232,0.35);
            --border:        rgba(201,168,76,0.16);
            --border-strong: rgba(201,168,76,0.42);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--ink);
            color: var(--silver);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Canvas starfield ── */
        #starfield {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Ambient blobs ── */
        .amb {
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
            animation: drift 20s ease-in-out infinite alternate;
        }
        .amb-1 { width: 600px; height: 600px; top: -200px; left: -200px; background: radial-gradient(circle, #3a1f6e, transparent 70%); }
        .amb-2 { width: 500px; height: 500px; bottom: -100px; right: -100px; background: radial-gradient(circle, #5c3a1e, transparent 70%); animation-delay: -10s; }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.1); } }

        /* ── Layout ── */
        .shell {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 24px 80px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── Top Nav ── */
        .topnav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 44px;
            padding: 14px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(12px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
        }
        .logo-glyph {
            font-size: 28px;
            animation: levitate 5s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
        }
        @keyframes levitate { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .logo-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.01em;
        }

        .app-nav {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .nav-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
        }
        .nav-pill:hover { background: rgba(255,255,255,0.05); border-color: var(--border-strong); color: var(--silver); }
        .nav-pill.active {
            background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.06));
            border-color: var(--border-strong);
            color: var(--gold-light);
        }
        .nav-pill-icon { font-size: 15px; }

        .nav-right { display: flex; align-items: center; gap: 10px; }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 5px 14px 5px 6px;
        }
        .user-avatar {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--violet), #3d2280);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }
        .user-email-txt { font-size: 12px; color: var(--silver-dim); }
        .logout-btn {
            background: none; border: none;
            font-size: 13px; color: var(--muted);
            cursor: pointer; margin-left: 4px;
            transition: color 0.2s;
        }
        .logout-btn:hover { color: #e07070; }

        .signin-btn {
            background: linear-gradient(135deg, var(--gold), #a8751e);
            border: none;
            border-radius: 100px;
            padding: 8px 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink);
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .signin-btn:hover { opacity: 0.85; }

        /* ── Hero (search mode) ── */
        .search-hero {
            text-align: center;
            padding: 40px 0 36px;
        }
        .hero-glyph {
            font-size: 72px;
            display: block;
            margin-bottom: 18px;
            animation: levitate 5s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(201,168,76,0.3)) drop-shadow(0 0 80px rgba(124,92,191,0.2));
        }
        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(38px, 6vw, 64px);
            font-weight: 300;
            color: var(--silver);
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 10px;
        }
        .hero-title em {
            font-style: italic;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-sub {
            font-size: 15px;
            font-weight: 300;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        /* ── Search Bar ── */
        .search-wrap {
            max-width: 720px;
            margin: 0 auto 50px;
        }
        .search-field {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 6px 6px 22px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-field:focus-within {
            border-color: rgba(201,168,76,0.55);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.07), 0 8px 32px rgba(0,0,0,0.3);
        }
        .search-ico { font-size: 16px; margin-right: 10px; opacity: 0.45; flex-shrink: 0; }
        .search-field input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 300;
            color: var(--silver);
            padding: 13px 0;
        }
        .search-field input::placeholder { color: var(--muted); }
        .search-go {
            background: linear-gradient(135deg, var(--gold), #a8751e);
            border: none;
            border-radius: 100px;
            padding: 11px 26px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--ink);
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: opacity 0.2s, box-shadow 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .search-go:hover { opacity: 0.88; box-shadow: 0 4px 20px rgba(201,168,76,0.35); }

        /* ── Results ── */
        .results-area {
            flex: 1;
            animation: fade-up 0.4s ease both;
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* AI Summary */
        .ai-summary {
            background: linear-gradient(135deg, rgba(201,168,76,0.06), rgba(124,92,191,0.08));
            border: 1px solid var(--border);
            border-left: 3px solid var(--gold);
            border-radius: 20px;
            padding: 26px 28px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }
        .ai-summary::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--gold), transparent);
            opacity: 0.4;
        }
        .summary-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .summary-icon { font-size: 22px; }
        .summary-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--gold-light);
            letter-spacing: 0.01em;
        }
        .summary-text {
            font-size: 14.5px;
            font-weight: 300;
            color: var(--silver-dim);
            line-height: 1.75;
        }

        /* Source badge */
        .source-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            background: var(--gold-dim);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 400;
            color: var(--gold);
            letter-spacing: 0.04em;
            margin-bottom: 20px;
        }

        /* Result card */
        .result-card {
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px 24px;
            margin-bottom: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }
        .result-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--gold), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .result-card:hover {
            transform: translateX(6px);
            border-color: var(--border-strong);
            background: rgba(201,168,76,0.04);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .result-card:hover::before { opacity: 1; }

        .result-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--gold-light);
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .result-url {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 10px;
            word-break: break-all;
            opacity: 0.7;
        }
        .result-snippet {
            font-size: 14px;
            font-weight: 300;
            color: var(--silver-dim);
            line-height: 1.65;
        }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 80px 20px;
        }
        .spinner-ring {
            width: 48px; height: 48px;
            border: 2px solid rgba(201,168,76,0.15);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 300;
            font-style: italic;
            color: var(--muted);
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 80px 20px;
        }
        .no-results-icon {
            font-size: 56px;
            margin-bottom: 20px;
            opacity: 0.4;
            display: block;
        }
        .no-results h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            font-weight: 400;
            color: var(--silver-dim);
            margin-bottom: 10px;
        }
        .no-results p { font-size: 14px; font-weight: 300; color: var(--muted); margin-bottom: 24px; }
        .fallback-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .fallback-btn {
            border: none;
            border-radius: 100px;
            padding: 10px 22px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .fallback-btn:hover { opacity: 0.82; }
        .fallback-google { background: #4285f4; }
        .fallback-ddg    { background: #de5833; }

        /* Error toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink);
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: linear-gradient(135deg, var(--gold), #a8751e); }
        .toast.error   { background: #c0444a; color: white; }

        /* ── Footer ── */
        footer {
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 30px;
            margin-top: 60px;
        }
        .footer-brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px;
            font-weight: 400;
            color: rgba(212,208,232,0.3);
            margin-bottom: 6px;
        }
        .footer-meta { font-size: 12px; color: var(--muted); }
        .footer-meta a { color: var(--gold); text-decoration: none; opacity: 0.7; }
        .footer-meta a:hover { opacity: 1; }

        /* ── Auth Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5,3,14,0.93);
            backdrop-filter: blur(18px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: linear-gradient(160deg, var(--ink-3), var(--ink-2));
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px 44px;
            width: 400px;
            max-width: 92vw;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: modal-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.9) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-glyph { font-size: 48px; margin-bottom: 16px; display: block; }
        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--silver);
            margin-bottom: 26px;
        }
        .field {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 13px 16px;
            color: var(--silver);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .field:focus { border-color: rgba(201,168,76,0.5); }
        .field::placeholder { color: var(--muted); }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), #a8751e);
            border: none;
            border-radius: 14px;
            padding: 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--ink);
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s;
            margin-top: 4px;
        }
        .btn-primary:hover { opacity: 0.88; box-shadow: 0 6px 24px rgba(201,168,76,0.3); }
        .btn-ghost {
            background: none; border: none;
            color: var(--gold);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
            margin-top: 14px;
            opacity: 0.8;
            transition: opacity 0.2s;
            width: 100%;
        }
        .btn-ghost:hover { opacity: 1; }
        .field-error { color: #e07070; font-size: 12px; margin-bottom: 10px; }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            .topnav { flex-direction: column; align-items: flex-start; gap: 10px; }
            .app-nav { flex-wrap: wrap; }
            .search-field { flex-wrap: wrap; padding: 8px 12px; border-radius: 16px; }
            .search-go { width: 100%; border-radius: 12px; margin-top: 8px; text-align: center; }
            .result-title { font-size: 17px; }
        }
    </style>
</head>
<body>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <div class="amb amb-1" aria-hidden="true"></div>
    <div class="amb amb-2" aria-hidden="true"></div>

    <div class="shell">
        <!-- Top Nav -->
        <nav class="topnav" aria-label="Wizard Ecosystem navigation">
            <a class="logo" href="https://wizardecosystem.dpdns.org" aria-label="Wizard Ecosystem home">
                <span class="logo-glyph" aria-hidden="true">🧙</span>
                <span class="logo-name">Wizard Ecosystem</span>
            </a>

            <div class="app-nav" role="list">
                <a class="nav-pill" href="https://wizardai.dpdns.org" role="listitem">
                    <span class="nav-pill-icon" aria-hidden="true">🧠</span> AI
                </a>
                <a class="nav-pill active" href="https://wizardecosystem.dpdns.org/search" role="listitem" aria-current="page">
                    <span class="nav-pill-icon" aria-hidden="true">🔍</span> Search
                </a>
                <a class="nav-pill" href="https://wizardecosystem.dpdns.org/mail" role="listitem">
                    <span class="nav-pill-icon" aria-hidden="true">📧</span> Mail
                </a>
                <a class="nav-pill" href="https://wizardecosystem.dpdns.org/calendar" role="listitem">
                    <span class="nav-pill-icon" aria-hidden="true">📅</span> Calendar
                </a>
                <a class="nav-pill" href="https://wizardecosystem.dpdns.org/chat" role="listitem">
                    <span class="nav-pill-icon" aria-hidden="true">💬</span> Chat
                </a>
            </div>

            <div class="nav-right">
                <div class="user-pill" id="user-pill" style="display:none;" role="status">
                    <div class="user-avatar" aria-hidden="true">🧙</div>
                    <span id="user-email-txt" class="user-email-txt"></span>
                    <button id="logout-btn" class="logout-btn" aria-label="Sign out" title="Sign out">✕</button>
                </div>
                <button id="signin-btn" class="signin-btn" style="display:none;" aria-label="Sign in">Sign In</button>
            </div>
        </nav>

        <!-- Hero -->
        <header class="search-hero" role="banner">
            <span class="hero-glyph" aria-hidden="true">🔍</span>
            <h1 class="hero-title">Wizard <em>Search</em></h1>
            <p class="hero-sub">AI-powered results — real, clickable, and intelligent</p>
        </header>

        <!-- Search Bar -->
        <div class="search-wrap" role="search">
            <div class="search-field">
                <span class="search-ico" aria-hidden="true">✦</span>
                <input
                    type="search"
                    id="search-input"
                    placeholder="Search the web…"
                    aria-label="Search the web"
                    autocomplete="off"
                    spellcheck="false"
                >
                <button class="search-go" id="search-btn" aria-label="Submit search">Search</button>
            </div>
        </div>

        <!-- Results -->
        <main id="results" class="results-area" aria-live="polite" aria-label="Search results"></main>

        <!-- Footer -->
        <footer role="contentinfo">
            <p class="footer-brand">🧙 Wizard Search</p>
            <p class="footer-meta">
                Results via DDG · Brave · Startpage &nbsp;·&nbsp;
                AI summaries by Llama 4 &nbsp;·&nbsp;
                Built by <a href="https://wizardecosystem.dpdns.org" rel="author">Arnav Gupta</a>
            </p>
        </footer>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- Auth Modal -->
    <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-box">
            <span class="modal-glyph" aria-hidden="true">🧙</span>
            <h2 class="modal-title" id="modal-title">Sign In</h2>
            <input class="field" type="email" id="login-email" placeholder="Email address" autocomplete="email">
            <input class="field" type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <div id="login-error" class="field-error" role="alert"></div>
            <button class="btn-primary" id="login-submit">Enter the Realm</button>
            <button class="btn-ghost" id="show-signup">Create an account →</button>
        </div>
    </div>

    <script>
        /* ── Starfield ── */
        (function() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let W, H;
            const stars = Array.from({ length: 200 }, () => ({
                x: Math.random(), y: Math.random(),
                r: Math.random() * 1.3 + 0.2,
                phase: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.8 + 0.3
            }));
            function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
            resize();
            window.addEventListener('resize', resize);
            (function draw() {
                ctx.clearRect(0, 0, W, H);
                const t = Date.now() / 1000;
                stars.forEach(s => {
                    const a = 0.25 + 0.5 * (Math.sin(t * s.speed + s.phase) * 0.5 + 0.5);
                    ctx.beginPath();
                    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(212,208,232,${a})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            })();
        })();

        /* ── REWRITTEN JAVASCRIPT ── */
        const API = 'https://arnav0928.pythonanywhere.com';
        let currentUser = null;
        let searchTimeout = null;

        // Toast notification
        let toastTimer;
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
        }

        // Escape HTML
        function esc(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ========== AUTHENTICATION ==========
        async function checkAuth() {
            try {
                const res = await fetch(`${API}/api/check-auth`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated && data.user) {
                        currentUser = data.user;
                        document.getElementById('user-pill').style.display = 'flex';
                        document.getElementById('user-email-txt').textContent = currentUser.email;
                        document.getElementById('signin-btn').style.display = 'none';
                        return;
                    }
                }
            } catch(e) {}
            document.getElementById('user-pill').style.display = 'none';
            document.getElementById('signin-btn').style.display = 'block';
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const errEl = document.getElementById('login-error');
            if (!email || !password) { errEl.textContent = 'Email and password required'; return; }
            try {
                const res = await fetch(`${API}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser = data.user;
                    closeModal();
                    document.getElementById('user-pill').style.display = 'flex';
                    document.getElementById('user-email-txt').textContent = currentUser.email;
                    document.getElementById('signin-btn').style.display = 'none';
                    showToast('Welcome back!');
                } else {
                    errEl.textContent = data.error || 'Login failed';
                }
            } catch(e) { errEl.textContent = 'Connection error'; }
        }

        async function handleLogout() {
            await fetch(`${API}/api/logout`, { method: 'POST', credentials: 'include' });
            currentUser = null;
            document.getElementById('user-pill').style.display = 'none';
            document.getElementById('signin-btn').style.display = 'block';
            showToast('Signed out');
        }

        function openModal() { document.getElementById('modal-overlay').classList.add('show'); }
        function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

        // ========== SEARCH SUGGESTIONS ==========
        async function getSuggestions(query) {
            if (!query || query.length < 2) {
                return;
            }
            
            try {
                const response = await fetch(`${API}/api/search/suggest?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.suggestions && data.suggestions.length > 0) {
                    console.log(`📝 Got ${data.suggestions.length} suggestions for "${query}"`);
                    // Suggestions are handled by the backend via API call
                }
            } catch (error) {
                console.error('Suggestions error:', error);
            }
        }

        // ========== SEARCH ==========
        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) { showToast('Enter a search term', 'error'); return; }

            // Update URL
            const newUrl = `${location.pathname}?q=${encodeURIComponent(query)}`;
            window.history.pushState({}, '', newUrl);

            const area = document.getElementById('results');
            area.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner-ring"></div>
                    <p class="loading-text">Consulting the arcane archives…</p>
                </div>`;

            try {
                const res = await fetch(`${API}/api/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ query })
                });
                const data = await res.json();
                
                if (!res.ok || !data.success) {
                    throw new Error(data.error || 'Search failed');
                }
                
                renderResults(data);
                
            } catch(err) {
                const q = encodeURIComponent(query);
                area.innerHTML = `
                    <div class="no-results">
                        <span class="no-results-icon">⚠️</span>
                        <h3>Search Interrupted</h3>
                        <p>${esc(err.message)}</p>
                        <div class="fallback-btns">
                            <button class="fallback-btn fallback-google" onclick="window.open('https://www.google.com/search?q=${q}','_blank')">🔍 Google</button>
                            <button class="fallback-btn fallback-ddg" onclick="window.open('https://duckduckgo.com/?q=${q}','_blank')">🦆 DuckDuckGo</button>
                        </div>
                    </div>`;
            }
        }

        function renderResults(data) {
            const area = document.getElementById('results');
            let html = '';

            // AI Summary - comes from Groq API via backend
            if (data.summary) {
                html += `
                    <div class="ai-summary" role="region" aria-label="AI Summary">
                        <div class="summary-header">
                            <span class="summary-icon" aria-hidden="true">🧙</span>
                            <span class="summary-label">About "${esc(data.query)}"</span>
                        </div>
                        <p class="summary-text">${esc(data.summary)}</p>
                    </div>`;
            }

            if (!data.results || !data.results.length) {
                const q = encodeURIComponent(data.query);
                html += `
                    <div class="no-results">
                        <span class="no-results-icon">🔍</span>
                        <h3>No results for "${esc(data.query)}"</h3>
                        <p>Try rephrasing your query, or search directly:</p>
                        <div class="fallback-btns">
                            <button class="fallback-btn fallback-google" onclick="window.open('https://www.google.com/search?q=${q}','_blank')">🔍 Google</button>
                            <button class="fallback-btn fallback-ddg" onclick="window.open('https://duckduckgo.com/?q=${q}','_blank')">🦆 DuckDuckGo</button>
                        </div>
                    </div>`;
                area.innerHTML = html;
                return;
            }

            html += `<div class="source-badge">✦ ${data.results.length} results · ${esc(data.source)}</div>`;

            for (const r of data.results) {
                html += `
                    <article class="result-card" role="article" onclick="window.open('${esc(r.url)}','_blank')" tabindex="0"
                        onkeydown="if(event.key==='Enter'||event.key===' '){window.open('${esc(r.url)}','_blank')}">
                        <div class="result-title">${esc(r.title)}</div>
                        <div class="result-url">${esc(r.url)}</div>
                        <p class="result-snippet">${esc(r.snippet)}</p>
                    </article>`;
            }

            area.innerHTML = html;
        }

        function loadFromURL() {
            const q = new URLSearchParams(location.search).get('q');
            if (q) {
                document.getElementById('search-input').value = decodeURIComponent(q);
                performSearch();
            }
        }

        // Input event for suggestions (debounced)
        function setupSearchInput() {
            const input = document.getElementById('search-input');
            input.addEventListener('input', (e) => {
                if (searchTimeout) clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => getSuggestions(e.target.value), 300);
            });
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById('search-btn').addEventListener('click', performSearch);
        document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') performSearch(); });
        document.getElementById('signin-btn').addEventListener('click', openModal);
        document.getElementById('login-submit').addEventListener('click', handleLogin);
        document.getElementById('logout-btn').addEventListener('click', handleLogout);
        document.getElementById('show-signup').addEventListener('click', () => { window.location.href = 'https://wizardecosystem.dpdns.org'; });
        
        // Close modal when clicking outside
        document.getElementById('modal-overlay').addEventListener('click', e => { 
            if (e.target === document.getElementById('modal-overlay')) closeModal(); 
        });
        
        // Enter key in modal inputs
        document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
        document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

        // Setup search suggestions
        setupSearchInput();

        // Initialize
        checkAuth();
        loadFromURL();
        
        console.log('🧙 Wizard Search ready!');
    </script>
</body>
</html>
