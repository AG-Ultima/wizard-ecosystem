<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🧙 Wizard Ecosystem</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0d0d1a, #12122a);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { text-align: center; padding: 40px; }
        .logo { font-size: 80px; margin-bottom: 20px; animation: float 3s infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        h1 { font-size: 48px; background: linear-gradient(135deg, #c4b5fd, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        p { color: #9a94c4; margin-bottom: 50px; }
        .apps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 30px;
            max-width: 800px;
            margin: 0 auto;
        }
        .app {
            background: rgba(18,18,42,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 24px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .app:hover {
            transform: translateY(-5px);
            border-color: #a78bfa;
            box-shadow: 0 0 30px rgba(167,139,250,0.3);
        }
        .app-icon { font-size: 48px; margin-bottom: 15px; }
        .app-name { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .app-desc { font-size: 12px; color: #9a94c4; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🧙</div>
        <h1>Wizard Ecosystem</h1>
        <p>Your complete magical workspace</p>
        <div class="apps">
            <div class="app" onclick="location.href='https://wizardai.dpdns.org'">
                <div class="app-icon">🧠</div>
                <div class="app-name">Wizard AI</div>
                <div class="app-desc">AI Assistant</div>
            </div>
            <div class="app" onclick="location.href='/mail/'">
                <div class="app-icon">📧</div>
                <div class="app-name">Wizard Mail</div>
                <div class="app-desc">Email Client</div>
            </div>
            <div class="app" onclick="location.href='/calendar/'">
                <div class="app-icon">📅</div>
                <div class="app-name">Wizard Calendar</div>
                <div class="app-desc">Schedule</div>
            </div>
            <div class="app" onclick="location.href='/chat/'">
                <div class="app-icon">💬</div>
                <div class="app-name">Wizard Chat</div>
                <div class="app-desc">Messaging</div>
            </div>
        </div>
    </div>
</body>
</html>
