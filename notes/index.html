<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Wizard Notes — AI-powered note-taking with summaries, tags, and sharing. Part of the Wizard Ecosystem.">
    <meta name="author" content="Arnav Gupta">
    <meta name="theme-color" content="#080612">
    <title>Wizard Notes — AI-Powered Note-Taking</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink:          #080612;
            --ink-2:        #0e0b1e;
            --ink-3:        #13102a;
            --ink-4:        #1a1635;
            --gold:         #c9a84c;
            --gold-light:   #e8c97a;
            --gold-dim:     rgba(201,168,76,0.15);
            --gold-glow:    rgba(201,168,76,0.2);
            --violet:       #7c5cbf;
            --silver:       #d4d0e8;
            --silver-dim:   rgba(212,208,232,0.6);
            --muted:        rgba(212,208,232,0.35);
            --border:       rgba(201,168,76,0.18);
            --border-strong:rgba(201,168,76,0.45);
            --success:      #4ade80;
            --danger:       #f87171;
            --warning:      #fbbf24;
        }

        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--ink);
            color: var(--silver);
        }

        #starfield { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .amb {
            position: fixed; border-radius: 50%;
            filter: blur(130px); pointer-events: none; z-index: 0;
            opacity: 0.28; animation: drift 20s ease-in-out infinite alternate;
        }
        .amb-1 { width: 600px; height: 600px; top: -180px; left: -180px; background: radial-gradient(circle, #3a1f6e, transparent 70%); }
        .amb-2 { width: 450px; height: 450px; bottom: -100px; right: -100px; background: radial-gradient(circle, #5c3a1e, transparent 70%); animation-delay: -10s; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(35px,25px); } }

        .notes-shell { position: relative; z-index: 10; display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(13,10,26,0.94);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            backdrop-filter: blur(20px);
            overflow-y: auto;
        }

        .sidebar-head { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
        .logo {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; margin-bottom: 24px;
        }
        .logo-glyph { font-size: 32px; filter: drop-shadow(0 0 10px rgba(201,168,76,0.4)); animation: lev 5s ease-in-out infinite; }
        @keyframes lev { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .logo-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px; font-weight: 600;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .user-card {
            background: var(--gold-dim);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 20px;
        }
        .user-email { font-size: 12px; color: var(--silver-dim); word-break: break-all; }

        .new-note-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), #a8751e);
            border: none; border-radius: 100px;
            padding: 12px;
            font-size: 14px; font-weight: 600;
            color: var(--ink);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-bottom: 24px;
            transition: all 0.2s;
        }
        .new-note-btn:hover { opacity: 0.88; transform: translateY(-2px); box-shadow: 0 4px 18px rgba(201,168,76,0.3); }

        .folder-section { padding: 0 16px 16px; }
        .folder-label {
            font-size: 10px; font-weight: 500; letter-spacing: 0.2em;
            text-transform: uppercase; color: var(--muted);
            padding: 10px 8px 6px;
        }
        .folder-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 12px;
            cursor: pointer; margin-bottom: 2px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .folder-item:hover { background: rgba(255,255,255,0.04); border-color: var(--border); }
        .folder-item.active {
            background: var(--gold-dim); border-color: var(--border-strong);
        }
        .folder-icon { font-size: 16px; width: 24px; }
        .folder-name { flex: 1; font-size: 13px; }
        .folder-count {
            font-size: 10px;
            background: var(--gold-dim);
            border: 1px solid rgba(201,168,76,0.2);
            padding: 2px 8px; border-radius: 100px;
        }

        .notes-list {
            flex: 1; overflow-y: auto;
            padding: 8px 12px;
            max-height: calc(100vh - 350px);
        }
        .note-item {
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            margin-bottom: 6px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .note-item:hover { background: rgba(255,255,255,0.04); border-color: var(--border); }
        .note-item.active {
            background: var(--gold-dim);
            border-color: var(--border-strong);
        }
        .shared-badge {
            font-size: 10px;
            color: var(--violet);
            margin-left: 8px;
        }
        .note-title {
            font-size: 14px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .note-preview {
            font-size: 11px; color: var(--silver-dim);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .note-date {
            font-size: 10px; color: var(--muted);
            margin-top: 6px;
        }
        .note-tags {
            display: flex; gap: 4px; flex-wrap: wrap;
            margin-top: 6px;
        }
        .note-tag {
            background: rgba(201,168,76,0.1);
            border-radius: 100px;
            padding: 2px 8px;
            font-size: 9px;
            color: var(--gold-light);
        }

        .tags-section {
            padding: 16px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }
        .tag-list {
            display: flex; flex-wrap: wrap; gap: 8px;
            margin-top: 10px;
        }
        .tag {
            background: rgba(201,168,76,0.1);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 5px 12px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tag:hover { background: rgba(201,168,76,0.2); }
        .tag.active {
            background: linear-gradient(135deg, var(--gold), #a8751e);
            color: var(--ink);
            border-color: transparent;
        }

        /* Main Editor */
        .main {
            flex: 1; display: flex; flex-direction: column;
            overflow: hidden; min-width: 0;
        }
        .editor-toolbar {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(13,10,26,0.7);
            backdrop-filter: blur(12px);
        }
        .editor-title-input {
            flex: 1;
            background: transparent;
            border: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--silver);
            outline: none;
            padding: 8px 0;
        }
        .editor-title-input::placeholder { color: var(--muted); }
        .editor-actions {
            display: flex; gap: 10px;
        }
        .icon-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
            color: var(--silver-dim);
            transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--gold-dim); border-color: var(--border-strong); color: var(--gold); }
        .delete-btn:hover { background: rgba(248,113,113,0.15); color: var(--danger); border-color: var(--danger); }
        .favorite-btn.active { color: var(--gold); }
        .shared-indicator {
            background: var(--violet-dim);
            border-radius: 100px;
            padding: 4px 12px;
            font-size: 11px;
            color: var(--violet);
        }

        .editor-body {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
        }
        .editor-content {
            width: 100%;
            min-height: 100%;
            background: transparent;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            line-height: 1.75;
            color: var(--silver-dim);
            resize: none;
            outline: none;
        }
        .editor-content::placeholder { color: var(--muted); }
        .editor-content:read-only {
            opacity: 0.7;
            cursor: default;
        }

        /* AI Panel */
        .ai-panel {
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            background: rgba(13,10,26,0.7);
            backdrop-filter: blur(12px);
        }
        .ai-panel-header {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 12px;
        }
        .ai-panel-header span { font-size: 12px; color: var(--gold); }
        .ai-input-group {
            display: flex; gap: 12px;
        }
        .ai-prompt {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 10px 18px;
            color: var(--silver);
            font-size: 13px;
            outline: none;
        }
        .ai-prompt:focus { border-color: var(--border-strong); }
        .ai-action-btn {
            background: linear-gradient(135deg, var(--gold), #a8751e);
            border: none;
            border-radius: 100px;
            padding: 10px 24px;
            font-size: 13px; font-weight: 600;
            color: var(--ink);
            cursor: pointer;
            transition: all 0.2s;
        }
        .ai-action-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .tag-input-group {
            display: flex; gap: 10px; margin-top: 14px;
        }
        .tag-input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 16px;
            font-size: 12px;
            color: var(--silver);
            outline: none;
        }
        .add-tag-btn {
            background: var(--gold-dim);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 18px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-tag-btn:hover { background: rgba(201,168,76,0.25); }
        .ai-response {
            margin-top: 14px;
            padding: 14px;
            background: rgba(201,168,76,0.05);
            border-radius: 14px;
            font-size: 13px;
            color: var(--silver-dim);
            display: none;
        }
        .apply-suggestion-btn {
            background: var(--gold-dim);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .apply-suggestion-btn:hover { background: rgba(201,168,76,0.25); }

        /* Modals */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(5,3,14,0.96);
            backdrop-filter: blur(20px);
            z-index: 10000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: linear-gradient(160deg, var(--ink-3), var(--ink-2));
            border: 1px solid var(--border-strong);
            border-radius: 28px;
            padding: 32px;
            width: 420px;
            max-width: 90vw;
            animation: modal-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.9) translateY(16px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-box h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: var(--gold);
            margin-bottom: 20px;
        }
        .modal-box input, .modal-box textarea, .modal-box select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--silver);
            margin-bottom: 16px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .modal-box input:focus, .modal-box textarea:focus, .modal-box select:focus {
            border-color: var(--border-strong);
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }
        .modal-confirm {
            background: linear-gradient(135deg, var(--gold), #a8751e);
            border: none;
            color: var(--ink);
        }
        .modal-cancel {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--silver-dim);
        }
        .modal-cancel:hover { background: rgba(255,255,255,0.1); }

        .shared-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .shared-item:hover { background: rgba(255,255,255,0.06); transform: translateX(4px); }
        .permission-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 100px;
            margin-left: 8px;
        }
        .permission-edit { background: rgba(74,222,128,0.15); color: var(--success); }
        .permission-view { background: rgba(201,168,76,0.15); color: var(--gold); }

        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, var(--gold), #a8751e);
            color: var(--ink);
            padding: 12px 28px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            z-index: 10001;
            transition: transform 0.3s;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: linear-gradient(135deg, var(--danger), #b44); color: white; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--gold), #a8751e); border-radius: 100px; }

        @media (max-width: 700px) {
            .sidebar { position: absolute; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .editor-title-input { font-size: 20px; }
            .editor-toolbar { padding: 12px 16px; }
            .editor-body { padding: 20px; }
        }
    </style>
</head>
<body>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <div class="amb amb-1" aria-hidden="true"></div>
    <div class="amb amb-2" aria-hidden="true"></div>

    <div class="notes-shell">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-head">
                <a class="logo" href="https://wizardecosystem.dpdns.org">
                    <span class="logo-glyph">📝</span>
                    <span class="logo-name">Wizard Notes</span>
                </a>
                <div class="user-card">
                    <div class="user-email" id="user-email">Loading…</div>
                </div>
                <button class="new-note-btn" id="new-note-btn">✨ New Note</button>
            </div>

            <div class="folder-section">
                <div class="folder-label">Folders</div>
                <div class="folder-item active" data-folder="all">
                    <span class="folder-icon">📓</span>
                    <span class="folder-name">All Notes</span>
                    <span class="folder-count" id="all-count">0</span>
                </div>
                <div class="folder-item" data-folder="favorites">
                    <span class="folder-icon">⭐</span>
                    <span class="folder-name">Favorites</span>
                    <span class="folder-count" id="fav-count">0</span>
                </div>
                <div class="folder-item" data-folder="recent">
                    <span class="folder-icon">🕐</span>
                    <span class="folder-name">Recent</span>
                </div>
                <div class="folder-item" data-folder="shared">
                    <span class="folder-icon">📬</span>
                    <span class="folder-name">Shared With Me</span>
                </div>
            </div>

            <div class="notes-list" id="notes-list">
                <div style="text-align:center; padding:40px; color:var(--muted);">Loading notes…</div>
            </div>

            <div class="tags-section">
                <div class="folder-label">Tags</div>
                <div class="tag-list" id="tag-list"></div>
            </div>
        </aside>

        <!-- Main Editor -->
        <main class="main">
            <div class="editor-toolbar">
                <input type="text" id="note-title" class="editor-title-input" placeholder="Untitled Note">
                <div class="editor-actions">
                    <button class="icon-btn" id="favorite-btn" title="Favorite">☆</button>
                    <button class="icon-btn" id="rename-btn" title="Rename">✏️</button>
                    <button class="icon-btn" id="share-btn" title="Share">🔗</button>
                    <button class="icon-btn" id="shared-btn" title="Shared with me">📬</button>
                    <button class="icon-btn delete-btn" id="delete-note-btn" title="Delete">🗑</button>
                </div>
            </div>
            <div id="shared-note-banner" class="shared-indicator" style="display:none; margin: 0 24px; padding: 8px 16px; background: rgba(124,92,191,0.15); border-radius: 12px;">
                📬 This note was shared with you by <span id="shared-owner-name"></span> · <span id="shared-permission-text"></span>
            </div>
            <div class="editor-body">
                <textarea id="note-content" class="editor-content" placeholder="Start writing your note here..."></textarea>
            </div>

            <!-- AI Panel -->
            <div class="ai-panel">
                <div class="ai-panel-header">
                    <span>🧙</span>
                    <span>Wizard AI Assistant</span>
                </div>
                <div class="ai-input-group">
                    <input type="text" id="ai-prompt" class="ai-prompt" placeholder="e.g., Make this more professional, Fix grammar, Add bullet points">
                    <button id="ai-action-btn" class="ai-action-btn">✨ Apply</button>
                </div>
                <div class="tag-input-group">
                    <input type="text" id="tag-input" class="tag-input" placeholder="Add tag...">
                    <button id="add-tag-btn" class="add-tag-btn">+ Add Tag</button>
                </div>
                <div id="ai-response" class="ai-response"></div>
            </div>
        </main>
    </div>

    <!-- New Note Modal -->
    <div id="new-note-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>✨ Create New Note</h3>
            <input type="text" id="new-note-title" placeholder="Note title" autofocus>
            <textarea id="new-note-content" rows="4" placeholder="Start writing..."></textarea>
            <div class="modal-buttons">
                <button id="confirm-new-note" class="modal-confirm">Create</button>
                <button id="cancel-new-note" class="modal-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Rename Modal -->
    <div id="rename-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>✏️ Rename Note</h3>
            <input type="text" id="rename-title" placeholder="New title">
            <div class="modal-buttons">
                <button id="confirm-rename" class="modal-confirm">Save</button>
                <button id="cancel-rename" class="modal-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>🔗 Share Note</h3>
            <p style="font-size:12px; color:var(--muted); margin-bottom:16px;">Share with another Wizard user</p>
            <input type="email" id="share-email" placeholder="user@example.com">
            <select id="share-permission">
                <option value="view">👁️ Can view</option>
                <option value="edit">✏️ Can edit</option>
            </select>
            <div id="share-error" class="error-msg" style="color:var(--danger); font-size:12px; display:none;"></div>
            <div class="modal-buttons">
                <button id="confirm-share" class="modal-confirm">Share</button>
                <button id="cancel-share" class="modal-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API = 'https://arnav0928.pythonanywhere.com';
        let currentUser = null;
        let notes = [];
        let sharedNotes = [];
        let currentNoteId = null;
        let currentSharedNoteData = null;
        let isSharedNote = false;
        let sharedPermission = null;
        let currentFolder = 'all';
        let currentTag = null;
        let saveTimeout = null;

        function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function toast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${isError ? 'error' : ''}`;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function checkAuth() {
            try {
                const res = await fetch(`${API}/api/check-auth`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated && data.user) {
                        currentUser = data.user;
                        document.getElementById('user-email').textContent = currentUser.email;
                        await loadNotes();
                        await loadSharedNotesList();
                        return;
                    }
                }
            } catch(e) {}
            window.location.href = 'https://wizardecosystem.dpdns.org';
        }

        async function loadNotes() {
            try {
                const res = await fetch(`${API}/api/notes`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    notes = data.notes || [];
                    renderNotesList();
                    renderTags();
                    if (notes.length > 0 && !currentNoteId && !isSharedNote) {
                        selectNote(notes[0].id);
                    }
                }
            } catch(e) { console.error('Load notes error:', e); }
        }

        async function loadSharedNotesList() {
            try {
                const res = await fetch(`${API}/api/notes/shared`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    sharedNotes = data.shared_notes || [];
                    if (currentFolder === 'shared') {
                        renderSharedNotesList();
                    }
                }
            } catch(e) { console.error('Load shared error:', e); }
        }

        function renderSharedNotesList() {
            const container = document.getElementById('notes-list');
            if (sharedNotes.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--muted);">📭 No notes shared with you</div>';
                return;
            }
            container.innerHTML = sharedNotes.map(n => `
                <div class="note-item ${currentNoteId === n.id && isSharedNote ? 'active' : ''}" data-id="${n.id}" data-owner="${n.owner_email}" data-permission="${n.permission}" data-title="${esc(n.title)}" data-content="${esc(n.content)}" data-shared="true">
                    <div class="note-title">
                        ${esc(n.title)}
                        <span class="permission-badge ${n.permission === 'edit' ? 'permission-edit' : 'permission-view'}">${n.permission === 'edit' ? '✏️ Can edit' : '👁️ Can view'}</span>
                    </div>
                    <div class="note-preview">${esc(n.content.substring(0, 80))}${n.content.length > 80 ? '…' : ''}</div>
                    <div class="note-date">from ${esc(n.owner_name)} · ${new Date(n.shared_at).toLocaleDateString()}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.note-item[data-shared="true"]').forEach(el => {
                el.addEventListener('click', () => {
                    const noteId = parseInt(el.dataset.id);
                    const owner = el.dataset.owner;
                    const permission = el.dataset.permission;
                    const title = el.dataset.title;
                    const content = el.dataset.content;
                    openSharedNote(noteId, owner, permission, title, content);
                });
            });
        }

        function openSharedNote(noteId, ownerEmail, permission, title, content) {
            isSharedNote = true;
            currentNoteId = noteId;
            currentSharedNoteData = { id: noteId, owner_email: ownerEmail, permission: permission, title: title, content: content };
            sharedPermission = permission;
            
            document.getElementById('note-title').value = title;
            document.getElementById('note-content').value = content;
            document.getElementById('note-content').readOnly = (permission !== 'edit');
            document.getElementById('favorite-btn').style.display = 'none';
            document.getElementById('rename-btn').style.display = 'none';
            document.getElementById('share-btn').style.display = 'none';
            document.getElementById('delete-note-btn').style.display = 'none';
            document.getElementById('add-tag-btn').style.display = 'none';
            document.getElementById('tag-input').style.display = 'none';
            
            const banner = document.getElementById('shared-note-banner');
            banner.style.display = 'block';
            document.getElementById('shared-owner-name').textContent = ownerEmail;
            document.getElementById('shared-permission-text').textContent = permission === 'edit' ? 'You can edit this note' : 'You can only view this note';
            
            renderNotesList();
            renderSharedNotesList();
        }

        async function saveSharedNote() {
            if (!isSharedNote || sharedPermission !== 'edit') return;
            
            const newTitle = document.getElementById('note-title').value;
            const newContent = document.getElementById('note-content').value;
            
            try {
                const res = await fetch(`${API}/api/notes/shared/${currentNoteId}/update`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        owner_email: currentSharedNoteData.owner_email,
                        title: newTitle, 
                        content: newContent 
                    })
                });
                if (res.ok) {
                    currentSharedNoteData.title = newTitle;
                    currentSharedNoteData.content = newContent;
                    toast('Shared note saved');
                }
            } catch(e) { console.error('Save shared error:', e); }
        }

        async function saveNote() {
            if (isSharedNote) {
                await saveSharedNote();
                return;
            }
            if (!currentNoteId) return;
            
            const title = document.getElementById('note-title').value;
            const content = document.getElementById('note-content').value;
            const note = notes.find(n => n.id === currentNoteId);
            if (!note) return;
            
            try {
                const res = await fetch(`${API}/api/notes/${currentNoteId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ title, content, tags: note.tags || [] })
                });
                if (res.ok) {
                    const updated = await res.json();
                    const index = notes.findIndex(n => n.id === currentNoteId);
                    if (index !== -1) notes[index] = updated.note;
                    renderNotesList();
                }
            } catch(e) { console.error('Save error:', e); }
        }

        async function createNewNote() {
            const title = document.getElementById('new-note-title').value.trim() || 'Untitled';
            const content = document.getElementById('new-note-content').value;
            
            try {
                const res = await fetch(`${API}/api/notes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ title, content })
                });
                if (res.ok) {
                    const data = await res.json();
                    notes.unshift(data.note);
                    renderNotesList();
                    selectNote(data.note.id);
                    document.getElementById('new-note-modal').classList.remove('show');
                    document.getElementById('new-note-title').value = '';
                    document.getElementById('new-note-content').value = '';
                    toast('✨ Note created');
                }
            } catch(e) { console.error('Create error:', e); }
        }

        async function renameNote() {
            if (isSharedNote) {
                if (sharedPermission === 'edit') {
                    const newTitle = document.getElementById('rename-title').value.trim();
                    if (newTitle) {
                        document.getElementById('note-title').value = newTitle;
                        await saveSharedNote();
                        document.getElementById('rename-modal').classList.remove('show');
                        toast('Note renamed');
                    }
                }
                return;
            }
            
            const newTitle = document.getElementById('rename-title').value.trim();
            if (!newTitle || !currentNoteId) return;
            
            const note = notes.find(n => n.id === currentNoteId);
            if (!note) return;
            
            try {
                const res = await fetch(`${API}/api/notes/${currentNoteId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ title: newTitle, content: note.content, tags: note.tags || [] })
                });
                if (res.ok) {
                    note.title = newTitle;
                    document.getElementById('note-title').value = newTitle;
                    renderNotesList();
                    document.getElementById('rename-modal').classList.remove('show');
                    toast('Note renamed');
                }
            } catch(e) { console.error('Rename error:', e); }
        }

        async function deleteNote() {
            if (isSharedNote) {
                toast('Cannot delete shared notes', true);
                return;
            }
            if (!currentNoteId) return;
            if (!confirm('Delete this note?')) return;
            try {
                const res = await fetch(`${API}/api/notes/${currentNoteId}`, { method: 'DELETE', credentials: 'include' });
                if (res.ok) {
                    notes = notes.filter(n => n.id !== currentNoteId);
                    renderNotesList();
                    renderTags();
                    if (notes.length > 0) {
                        selectNote(notes[0].id);
                    } else {
                        currentNoteId = null;
                        isSharedNote = false;
                        document.getElementById('note-title').value = '';
                        document.getElementById('note-content').value = '';
                        document.getElementById('shared-note-banner').style.display = 'none';
                        document.getElementById('note-content').readOnly = false;
                        document.getElementById('favorite-btn').style.display = 'flex';
                        document.getElementById('rename-btn').style.display = 'flex';
                        document.getElementById('share-btn').style.display = 'flex';
                        document.getElementById('delete-note-btn').style.display = 'flex';
                        document.getElementById('add-tag-btn').style.display = 'flex';
                        document.getElementById('tag-input').style.display = 'flex';
                    }
                    toast('Note deleted');
                }
            } catch(e) { console.error('Delete error:', e); }
        }

        async function toggleFavorite() {
            if (isSharedNote) return;
            const note = notes.find(n => n.id === currentNoteId);
            if (!note) return;
            const newFav = !note.is_favorite;
            
            try {
                const res = await fetch(`${API}/api/notes/${currentNoteId}/favorite`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ favorite: newFav })
                });
                if (res.ok) {
                    note.is_favorite = newFav;
                    renderNotesList();
                    const favBtn = document.getElementById('favorite-btn');
                    favBtn.innerHTML = newFav ? '⭐' : '☆';
                    favBtn.classList.toggle('active', newFav);
                    toast(newFav ? 'Added to favorites' : 'Removed from favorites');
                }
            } catch(e) { console.error('Favorite error:', e); }
        }

        async function addTag() {
            if (isSharedNote) {
                toast('Cannot add tags to shared notes', true);
                return;
            }
            const tagInput = document.getElementById('tag-input');
            const tag = tagInput.value.trim().toLowerCase();
            if (!tag || !currentNoteId) return;
            
            const note = notes.find(n => n.id === currentNoteId);
            if (!note) return;
            
            const tags = note.tags || [];
            if (tags.includes(tag)) {
                toast('Tag already exists', true);
                return;
            }
            tags.push(tag);
            
            try {
                const res = await fetch(`${API}/api/notes/${currentNoteId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ title: note.title, content: note.content, tags })
                });
                if (res.ok) {
                    note.tags = tags;
                    renderNotesList();
                    renderTags();
                    tagInput.value = '';
                    toast(`#${tag} added`);
                }
            } catch(e) { console.error('Add tag error:', e); }
        }

        async function askAI() {
            const prompt = document.getElementById('ai-prompt').value;
            const currentContent = document.getElementById('note-content').value;
            if (!prompt && !currentContent) {
                toast('Enter a prompt or write some content first', true);
                return;
            }
            
            const responseDiv = document.getElementById('ai-response');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div style="text-align:center;"><div class="spinner" style="width:20px;height:20px;border:2px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;"></div></div>';
            
            try {
                const aiPrompt = prompt ? 
                    `Improve/transform the following note based on: ${prompt}\n\nNote content:\n${currentContent}\n\nReturn ONLY the improved/transformed version of the note. Do not add explanations or commentary.` :
                    `Summarize this note in 2-3 sentences:\n\n${currentContent}`;
                
                const res = await fetch(`${API}/api/chat/simple`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ prompt: aiPrompt, mode: 'Fast' })
                });
                const data = await res.json();
                if (data.response) {
                    if (prompt) {
                        document.getElementById('note-content').value = data.response;
                        await saveNote();
                        responseDiv.innerHTML = `<span style="color:var(--success);">✅ Note updated with AI suggestion!</span>`;
                        toast('Note updated with AI');
                        setTimeout(() => responseDiv.style.display = 'none', 2000);
                    } else {
                        responseDiv.innerHTML = `<strong style="color:var(--gold);">✨ Summary:</strong><br><br>${esc(data.response)}`;
                    }
                }
            } catch(e) { responseDiv.innerHTML = 'Error getting AI response'; }
            document.getElementById('ai-prompt').value = '';
        }

        async function shareNote() {
            if (isSharedNote) {
                toast('Cannot share shared notes', true);
                return;
            }
            const email = document.getElementById('share-email').value.trim();
            const permission = document.getElementById('share-permission').value;
            const errorDiv = document.getElementById('share-error');
            
            if (!email) {
                errorDiv.textContent = 'Enter an email address';
                errorDiv.style.display = 'block';
                return;
            }
            errorDiv.style.display = 'none';
            
            try {
                const res = await fetch(`${API}/api/notes/${currentNoteId}/share`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, permission })
                });
                if (res.ok) {
                    toast(`Note shared with ${email}`);
                    document.getElementById('share-modal').classList.remove('show');
                    document.getElementById('share-email').value = '';
                } else {
                    const err = await res.json();
                    errorDiv.textContent = err.error || 'Share failed';
                    errorDiv.style.display = 'block';
                }
            } catch(e) {
                errorDiv.textContent = 'Connection error';
                errorDiv.style.display = 'block';
            }
        }

        function selectNote(id) {
            if (currentNoteId === id && !isSharedNote) return;
            isSharedNote = false;
            currentNoteId = id;
            const note = notes.find(n => n.id === id);
            if (note) {
                document.getElementById('note-title').value = note.title;
                document.getElementById('note-content').value = note.content;
                document.getElementById('note-content').readOnly = false;
                document.getElementById('shared-note-banner').style.display = 'none';
                document.getElementById('favorite-btn').style.display = 'flex';
                document.getElementById('rename-btn').style.display = 'flex';
                document.getElementById('share-btn').style.display = 'flex';
                document.getElementById('delete-note-btn').style.display = 'flex';
                document.getElementById('add-tag-btn').style.display = 'flex';
                document.getElementById('tag-input').style.display = 'flex';
                const favBtn = document.getElementById('favorite-btn');
                favBtn.innerHTML = note.is_favorite ? '⭐' : '☆';
                favBtn.classList.toggle('active', note.is_favorite);
            }
            renderNotesList();
            if (currentFolder === 'shared') {
                renderSharedNotesList();
            }
        }

        function filterNotes() {
            let filtered = [...notes];
            if (currentFolder === 'favorites') {
                filtered = filtered.filter(n => n.is_favorite);
            } else if (currentFolder === 'recent') {
                filtered = filtered.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at)).slice(0, 10);
            }
            if (currentTag) {
                filtered = filtered.filter(n => n.tags && n.tags.includes(currentTag));
            }
            return filtered;
        }

        function renderNotesList() {
            const container = document.getElementById('notes-list');
            const filtered = filterNotes();
            
            if (filtered.length === 0 && currentFolder !== 'shared') {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--muted);">📭 No notes<br>Click "New Note" to start</div>';
                return;
            }
            
            if (currentFolder === 'shared') {
                renderSharedNotesList();
                return;
            }
            
            container.innerHTML = filtered.map(n => `
                <div class="note-item ${n.id === currentNoteId && !isSharedNote ? 'active' : ''}" data-id="${n.id}">
                    <div class="note-title">${esc(n.title || 'Untitled')}${n.is_favorite ? ' ⭐' : ''}</div>
                    <div class="note-preview">${esc((n.content || '').substring(0, 80))}${(n.content || '').length > 80 ? '…' : ''}</div>
                    <div class="note-date">${new Date(n.updated_at).toLocaleDateString()}</div>
                    ${n.tags && n.tags.length ? `<div class="note-tags">${n.tags.map(t => `<span class="note-tag">#${esc(t)}</span>`).join('')}</div>` : ''}
                </div>
            `).join('');
            
            document.querySelectorAll('.note-item:not([data-shared="true"])').forEach(el => {
                el.addEventListener('click', () => selectNote(parseInt(el.dataset.id)));
            });
            
            document.getElementById('all-count').textContent = notes.length;
            document.getElementById('fav-count').textContent = notes.filter(n => n.is_favorite).length;
        }

        function renderTags() {
            const allTags = new Set();
            notes.forEach(n => { if (n.tags) n.tags.forEach(t => allTags.add(t)); });
            const container = document.getElementById('tag-list');
            if (allTags.size === 0) {
                container.innerHTML = '<div style="color:var(--muted); font-size:11px; text-align:center;">No tags yet</div>';
                return;
            }
            container.innerHTML = Array.from(allTags).map(t => `
                <div class="tag ${currentTag === t ? 'active' : ''}" data-tag="${esc(t)}">#${esc(t)}</div>
            `).join('');
            
            document.querySelectorAll('.tag').forEach(el => {
                el.addEventListener('click', () => {
                    const tag = el.dataset.tag;
                    currentTag = currentTag === tag ? null : tag;
                    renderTags();
                    renderNotesList();
                });
            });
        }

        // Auto-save
        document.getElementById('note-title').addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => saveNote(), 500);
        });
        document.getElementById('note-content').addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => saveNote(), 500);
        });

        // Event Listeners
        document.getElementById('new-note-btn').onclick = () => document.getElementById('new-note-modal').classList.add('show');
        document.getElementById('confirm-new-note').onclick = createNewNote;
        document.getElementById('cancel-new-note').onclick = () => document.getElementById('new-note-modal').classList.remove('show');
        document.getElementById('rename-btn').onclick = () => {
            if (!currentNoteId && !isSharedNote) { toast('Select a note first', true); return; }
            if (isSharedNote && sharedPermission !== 'edit') { toast('You only have view permission', true); return; }
            document.getElementById('rename-title').value = document.getElementById('note-title').value;
            document.getElementById('rename-modal').classList.add('show');
        };
        document.getElementById('confirm-rename').onclick = renameNote;
        document.getElementById('cancel-rename').onclick = () => document.getElementById('rename-modal').classList.remove('show');
        document.getElementById('delete-note-btn').onclick = deleteNote;
        document.getElementById('favorite-btn').onclick = toggleFavorite;
        document.getElementById('share-btn').onclick = () => {
            if (!currentNoteId && !isSharedNote) { toast('Select a note first', true); return; }
            if (isSharedNote) { toast('Cannot share shared notes', true); return; }
            document.getElementById('share-modal').classList.add('show');
        };
        document.getElementById('confirm-share').onclick = shareNote;
        document.getElementById('cancel-share').onclick = () => document.getElementById('share-modal').classList.remove('show');
        document.getElementById('shared-btn').onclick = () => {
            currentFolder = 'shared';
            document.querySelectorAll('.folder-item').forEach(f => f.classList.remove('active'));
            document.querySelector('.folder-item[data-folder="shared"]').classList.add('active');
            renderNotesList();
        };
        document.getElementById('ai-action-btn').onclick = askAI;
        document.getElementById('add-tag-btn').onclick = addTag;
        document.getElementById('tag-input').addEventListener('keypress', e => { if (e.key === 'Enter') addTag(); });
        document.getElementById('ai-prompt').addEventListener('keypress', e => { if (e.key === 'Enter') askAI(); });

        // Folder navigation
        document.querySelectorAll('.folder-item').forEach(f => {
            f.addEventListener('click', () => {
                document.querySelectorAll('.folder-item').forEach(x => x.classList.remove('active'));
                f.classList.add('active');
                currentFolder = f.dataset.folder;
                currentTag = null;
                isSharedNote = false;
                renderTags();
                renderNotesList();
                if (currentFolder !== 'shared') {
                    document.getElementById('shared-note-banner').style.display = 'none';
                }
            });
        });

        window.addEventListener('beforeunload', () => { if (currentNoteId) saveNote(); });

        const hamburger = document.createElement('button');
        hamburger.innerHTML = '☰';
        hamburger.style.cssText = 'position:fixed; top:15px; left:15px; z-index:1000; background:linear-gradient(135deg,var(--gold),#a8751e); border:none; border-radius:50%; width:40px; height:40px; font-size:20px; color:var(--ink); cursor:pointer; display:none;';
        document.body.appendChild(hamburger);
        hamburger.addEventListener('click', () => document.querySelector('.sidebar').classList.toggle('open'));
        
        if (window.innerWidth <= 700) {
            hamburger.style.display = 'block';
            document.querySelector('.sidebar').classList.add('open');
        }

        checkAuth();
    </script>
</body>
</html>
