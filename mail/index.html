<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙 Wizard Mail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #16162a;
            --text-primary: #f0f0ff;
            --text-secondary: #c8c4e0;
            --text-muted: #8a84a4;
            --border: rgba(139,92,246,0.25);
            --primary: #9b6df6;
            --primary-dark: #7c3aed;
            --primary-light: #b89efd;
            --success: #10b981;
            --warning: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        .container { display: flex; height: 100vh; }
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .logo-icon { font-size: 36px; }
        .logo h1 { font-size: 22px; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info {
            background: rgba(139,92,246,0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .user-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 12px; }
        .user-email { font-size: 12px; color: var(--primary-light); word-break: break-all; }
        .connect-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 24px;
            padding: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .compose-btn {
            width: 100%;
            background: rgba(139,92,246,0.15);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .folder-list { list-style: none; flex: 1; }
        .folder-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .folder-item:hover { background: rgba(139,92,246,0.1); }
        .folder-item.active { background: rgba(139,92,246,0.2); border-left: 3px solid var(--primary); }
        .folder-icon { font-size: 20px; }
        .folder-name { flex: 1; }
        .folder-count { background: rgba(139,92,246,0.3); padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .search-box { display: flex; gap: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 40px; padding: 8px 16px; width: 280px; }
        .search-box input { flex: 1; background: none; border: none; color: var(--text-primary); outline: none; }
        .email-list { flex: 1; overflow-y: auto; }
        .email-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .email-item:hover { background: rgba(139,92,246,0.05); }
        .email-from { width: 200px; font-weight: 500; }
        .email-subject { flex: 1; }
        .email-date { width: 100px; font-size: 12px; color: var(--text-muted); }
        .loading { text-align: center; padding: 60px; color: var(--text-muted); }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 32px;
            width: 450px;
            border: 1px solid var(--border);
        }
        .modal-card h3 { margin-bottom: 20px; }
        .modal-card input, .modal-card textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            margin-bottom: 16px;
        }
        .modal-card textarea { height: 150px; resize: vertical; }
        .modal-card button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 24px;
            padding: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .app-pass-note {
            background: rgba(245,158,11,0.15);
            border: 1px solid var(--warning);
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            font-size: 12px;
            color: var(--warning);
        }
        .connected-badge {
            background: rgba(16,185,129,0.15);
            border: 1px solid var(--success);
            border-radius: 24px;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: var(--success);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo"><span class="logo-icon">📧</span><h1>Wizard Mail</h1></div>
            <div class="user-info"><div class="user-avatar">🧙</div><div id="user-email" class="user-email">Loading...</div></div>
            <div id="connection-status"></div>
            <button class="compose-btn" id="compose-btn">✏️ Compose</button>
            <ul class="folder-list">
                <li class="folder-item active" data-folder="INBOX"><span class="folder-icon">📥</span><span class="folder-name">Inbox</span><span class="folder-count" id="inbox-count">0</span></li>
            </ul>
        </div>
        <div class="main">
            <div class="header"><h2>Inbox</h2><div class="search-box"><span>🔍</span><input type="text" id="search-input" placeholder="Search..."></div></div>
            <div id="email-list" class="email-list"><div class="loading">✨ Connect your Gmail</div></div>
        </div>
    </div>
    
    <div id="connect-modal" class="modal">
        <div class="modal-card">
            <h3>🔗 Connect Gmail</h3>
            <input type="email" id="connect-email" placeholder="Gmail address">
            <input type="password" id="connect-password" placeholder="App Password">
            <button id="connect-submit">Connect</button>
            <div class="app-pass-note">🔐 <strong>Gmail requires an App Password</strong><br>1. Go to <a href="https://myaccount.google.com/apppasswords" target="_blank" style="color:var(--primary-light);">Google App Passwords</a><br>2. Select "Mail" → "Other" → Name it "Wizard Browser"<br>3. Copy the 16-character password here</div>
            <button id="close-connect" style="margin-top: 12px; background: rgba(139,92,246,0.2);">Cancel</button>
        </div>
    </div>
    
    <div id="compose-modal" class="modal">
        <div class="modal-card">
            <h3>✏️ New Message</h3>
            <input type="email" id="compose-to" placeholder="To">
            <input type="text" id="compose-subject" placeholder="Subject">
            <textarea id="compose-body" placeholder="Write your message..."></textarea>
            <button id="send-btn">Send</button>
            <button id="close-compose" style="margin-top: 12px; background: rgba(139,92,246,0.2);">Cancel</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://arnav0928.pythonanywhere.com';
        let currentUser = null;
        let currentEmails = [];
        
        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/api/check-auth`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated && data.user) {
                        currentUser = data.user;
                        document.getElementById('user-email').textContent = currentUser.email;
                        await checkConnection();
                        return;
                    }
                }
            } catch(e) {}
            // Not logged in - redirect to ecosystem
            window.location.href = 'https://wizardecosystem.dpdns.org';
        }
        
        async function checkConnection() {
            try {
                const res = await fetch(`${API_BASE}/api/mail/emails`, { credentials: 'include' });
                if (res.ok) {
                    document.getElementById('connection-status').innerHTML = '<div class="connected-badge">✅ Connected to Gmail</div>';
                    await loadEmails();
                } else {
                    document.getElementById('connection-status').innerHTML = '<button class="connect-btn" id="connect-btn">🔗 Connect Gmail</button>';
                    document.getElementById('connect-btn').onclick = () => document.getElementById('connect-modal').classList.add('show');
                }
            } catch(e) {
                document.getElementById('connection-status').innerHTML = '<button class="connect-btn" id="connect-btn">🔗 Connect Gmail</button>';
                const btn = document.getElementById('connect-btn');
                if (btn) btn.onclick = () => document.getElementById('connect-modal').classList.add('show');
            }
        }
        
        async function connectEmail() {
            const email = document.getElementById('connect-email').value;
            const password = document.getElementById('connect-password').value;
            if (!email || !password) { alert('Please enter email and app password'); return; }
            try {
                const res = await fetch(`${API_BASE}/api/mail/connect`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                if (res.ok) {
                    document.getElementById('connect-modal').classList.remove('show');
                    document.getElementById('connect-email').value = '';
                    document.getElementById('connect-password').value = '';
                    await checkConnection();
                } else {
                    const err = await res.json();
                    alert(err.error || 'Connection failed. Make sure you\'re using an App Password.');
                }
            } catch(e) { alert('Connection failed'); }
        }
        
        async function loadEmails() {
            try {
                const res = await fetch(`${API_BASE}/api/mail/emails`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    currentEmails = data.emails || [];
                    renderEmailList();
                }
            } catch(e) {}
        }
        
        function renderEmailList() {
            const container = document.getElementById('email-list');
            if (!currentEmails.length) {
                container.innerHTML = '<div class="loading">📭 No emails found</div>';
                document.getElementById('inbox-count').textContent = '0';
                return;
            }
            container.innerHTML = currentEmails.map(email => `
                <div class="email-item" data-id="${email.id}">
                    <div class="email-from">${escapeHtml(email.from)}</div>
                    <div class="email-subject">${escapeHtml(email.subject)}</div>
                    <div class="email-date">${formatDate(email.date)}</div>
                </div>
            `).join('');
            document.getElementById('inbox-count').textContent = currentEmails.length;
        }
        
        async function sendEmail() {
            const to = document.getElementById('compose-to').value;
            const subject = document.getElementById('compose-subject').value;
            const body = document.getElementById('compose-body').value;
            if (!to || !subject || !body) { alert('Please fill in all fields'); return; }
            try {
                const res = await fetch(`${API_BASE}/api/mail/send`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                    body: JSON.stringify({ to, subject, body })
                });
                if (res.ok) {
                    alert('Email sent!');
                    document.getElementById('compose-modal').classList.remove('show');
                    document.getElementById('compose-to').value = '';
                    document.getElementById('compose-subject').value = '';
                    document.getElementById('compose-body').value = '';
                } else { alert('Failed to send email'); }
            } catch(e) { alert('Failed to send email'); }
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            if (diff < 86400000) return date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            if (diff < 604800000) return date.toLocaleDateString([], { weekday:'short' });
            return date.toLocaleDateString([], { month:'short', day:'numeric' });
        }
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        document.getElementById('compose-btn').onclick = () => document.getElementById('compose-modal').classList.add('show');
        document.getElementById('close-compose').onclick = () => document.getElementById('compose-modal').classList.remove('show');
        document.getElementById('send-btn').onclick = sendEmail;
        document.getElementById('connect-submit').onclick = connectEmail;
        document.getElementById('close-connect').onclick = () => document.getElementById('connect-modal').classList.remove('show');
        
        checkAuth();
    </script>
</body>
</html>
