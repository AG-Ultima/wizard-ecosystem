<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wizard Calendar — AI-powered scheduling and event management. Part of the Wizard Ecosystem by Arnav Gupta. Create, organize, and manage your events with magical ease.">
    <meta name="keywords" content="Wizard Calendar, Wizard Ecosystem, AI calendar, event management, scheduling app, productivity, Arnav Gupta">
    <meta name="author" content="Arnav Gupta">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0a0814">

    <!-- Open Graph -->
    <meta property="og:title" content="Wizard Calendar — Magical Event Management">
    <meta property="og:description" content="Schedule events and manage your time. Part of the Wizard Ecosystem.">
    <meta property="og:image" content="https://wizardecosystem.dpdns.org/favicon.ico">
    <meta property="og:url" content="https://wizardecosystem.dpdns.org/calendar">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Wizard Ecosystem">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Wizard Calendar — Magical Event Management">
    <meta name="twitter:description" content="Schedule events and manage your time. Part of the Wizard Ecosystem.">
    <meta name="twitter:image" content="https://wizardecosystem.dpdns.org/favicon.ico">

    <!-- Canonical -->
    <link rel="canonical" href="https://wizardecosystem.dpdns.org/calendar">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Wizard Calendar",
      "url": "https://wizardecosystem.dpdns.org/calendar",
      "description": "AI-powered calendar and event management tool, part of the Wizard Ecosystem productivity suite.",
      "applicationCategory": "ProductivityApplication",
      "author": { "@type": "Person", "name": "Arnav Gupta" },
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "isPartOf": { "@type": "WebApplication", "name": "Wizard Ecosystem", "url": "https://wizardecosystem.dpdns.org" }
    }
    </script>

    <title>Wizard Calendar — Magical Event Management</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #080612;
            --ink-2: #0e0b1e;
            --ink-3: #13102a;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-glow: rgba(201,168,76,0.18);
            --violet: #7c5cbf;
            --violet-dim: rgba(124,92,191,0.25);
            --silver: #d4d0e8;
            --silver-dim: rgba(212,208,232,0.5);
            --muted: rgba(212,208,232,0.35);
            --border: rgba(201,168,76,0.18);
            --border-strong: rgba(201,168,76,0.45);
            --danger: #e05555;
            --success: #5cb87a;
        }

        html { height: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--ink);
            color: var(--silver);
            height: 100vh;
            overflow: hidden;
        }

        /* ── Canvas Stars ── */
        #starfield {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Ambient blobs ── */
        .ambient {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            animation: drift 18s ease-in-out infinite alternate;
        }
        .ambient-1 { width: 600px; height: 600px; top: -150px; left: -150px; background: radial-gradient(circle, #3a1f6e, transparent 70%); }
        .ambient-2 { width: 500px; height: 500px; bottom: -100px; right: -100px; background: radial-gradient(circle, #5c3a1e, transparent 70%); animation-delay: -9s; }
        .ambient-3 { width: 400px; height: 400px; top: 40%; left: 40%; background: radial-gradient(circle, #1a1040, transparent 70%); animation-delay: -4s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        /* ── Layout ── */
        .calendar-container {
            position: relative;
            z-index: 10;
            display: flex;
            height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: linear-gradient(160deg, rgba(19,16,42,0.98), rgba(14,11,30,0.98));
            border-right: 1px solid var(--border);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 22px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
        }
        .logo-icon { font-size: 30px; filter: drop-shadow(0 0 12px rgba(201,168,76,0.3)); }
        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 400;
            color: var(--silver);
            letter-spacing: 0.01em;
        }
        .logo-text em {
            font-style: italic;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--violet), #3d2280);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .user-email {
            font-size: 12px;
            color: var(--silver-dim);
            word-break: break-all;
            letter-spacing: 0.01em;
        }

        /* ── Month Navigator ── */
        .month-navigator {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 16px;
            margin-bottom: 20px;
        }
        .month-nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .mini-nav-btn {
            background: rgba(201,168,76,0.1);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px 12px;
            color: var(--gold);
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s, border-color 0.2s;
        }
        .mini-nav-btn:hover { background: rgba(201,168,76,0.2); border-color: var(--border-strong); }
        .mini-month-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--silver);
            letter-spacing: 0.02em;
        }

        .mini-calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            text-align: center;
        }
        .mini-weekday {
            font-size: 10px;
            color: var(--muted);
            padding: 5px 2px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .mini-day {
            padding: 6px 2px;
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--silver-dim);
        }
        .mini-day:hover { background: rgba(201,168,76,0.12); color: var(--silver); }
        .mini-day.today {
            background: linear-gradient(135deg, var(--gold), #a8751e);
            color: var(--ink);
            font-weight: 600;
        }
        .mini-day.has-event { color: var(--gold-light); font-weight: 500; position: relative; }
        .mini-day.has-event::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--gold);
        }
        .mini-day.other-month { opacity: 0.25; cursor: default; }

        /* ── Create Button ── */
        .create-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), #a8751e);
            border: none;
            border-radius: 100px;
            padding: 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--ink);
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.2s, box-shadow 0.2s, transform 0.2s;
            margin-top: 4px;
        }
        .create-btn:hover { opacity: 0.88; box-shadow: 0 6px 24px rgba(201,168,76,0.35); transform: translateY(-1px); }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 22px;
            border-top: 1px solid var(--border);
        }
        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.03em;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--gold); }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .calendar-header {
            padding: 18px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8,6,18,0.6);
            backdrop-filter: blur(10px);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .month-nav-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 7px 14px;
            color: var(--silver-dim);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .month-nav-btn:hover { border-color: var(--border-strong); color: var(--gold); background: rgba(201,168,76,0.06); }
        .current-month-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            font-weight: 300;
            color: var(--silver);
            letter-spacing: -0.01em;
            min-width: 220px;
        }
        .current-month-title em {
            font-style: italic;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .view-buttons { display: flex; gap: 6px; }
        .view-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 7px 18px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--silver-dim);
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .view-btn:hover { border-color: var(--border-strong); color: var(--silver); }
        .view-btn.active {
            background: linear-gradient(135deg, var(--gold), #a8751e);
            border-color: transparent;
            color: var(--ink);
        }

        /* ── Month View Grid ── */
        .month-view {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            overflow: auto;
        }
        .month-day-header {
            text-align: center;
            padding: 10px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.01);
        }
        .month-day-cell {
            min-height: 100px;
            padding: 10px 10px 8px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        .month-day-cell:hover { background: rgba(201,168,76,0.04); }
        .month-day-cell.today { background: rgba(201,168,76,0.07); }
        .month-day-cell.other-month { opacity: 0.3; cursor: default; }
        .day-number {
            font-size: 13px;
            font-weight: 400;
            color: var(--silver-dim);
            margin-bottom: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px; height: 26px;
            border-radius: 50%;
        }
        .month-day-cell.today .day-number {
            background: linear-gradient(135deg, var(--gold), #a8751e);
            color: var(--ink);
            font-weight: 600;
        }

        .event-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 7px;
            margin-bottom: 3px;
            font-size: 11px;
            color: var(--silver-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.15s;
        }
        .event-pill:hover { background: rgba(201,168,76,0.12); border-color: var(--border-strong); color: var(--silver); }
        .event-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Week View ── */
        .week-view {
            flex: 1;
            display: none;
            grid-template-columns: 64px repeat(7, 1fr);
            overflow: auto;
        }
        .week-view.active { display: grid; }
        .week-time-gutter { grid-column: 1; }
        .time-label {
            height: 60px;
            padding: 4px 8px 0;
            font-size: 10px;
            color: var(--muted);
            text-align: right;
            letter-spacing: 0.03em;
            border-bottom: 1px solid rgba(201,168,76,0.06);
        }
        .week-day-col {
            border-right: 1px solid var(--border);
        }
        .week-day-header {
            text-align: center;
            padding: 10px 4px;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(8,6,18,0.9);
            backdrop-filter: blur(10px);
        }
        .week-day-header.today-col { color: var(--gold); }
        .week-hour-cell {
            height: 60px;
            border-bottom: 1px solid rgba(201,168,76,0.06);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .week-hour-cell:hover { background: rgba(201,168,76,0.04); }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5,3,14,0.92);
            backdrop-filter: blur(16px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }

        .modal-box {
            background: linear-gradient(160deg, var(--ink-3), var(--ink-2));
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 44px 40px;
            width: 480px;
            max-width: 92vw;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
            animation: modal-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.9) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-glyph { font-size: 40px; margin-bottom: 14px; display: block; }
        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--silver);
            margin-bottom: 26px;
            letter-spacing: -0.01em;
        }

        .field {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--silver);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .field:focus { border-color: rgba(201,168,76,0.5); }
        .field::placeholder { color: var(--muted); }
        .field-row { display: flex; gap: 10px; }
        .field-row .field { flex: 1; }
        textarea.field { height: 90px; resize: vertical; }

        .color-select-wrap {
            position: relative;
            margin-bottom: 12px;
        }
        .color-select-wrap select.field { margin-bottom: 0; appearance: none; padding-right: 36px; cursor: pointer; }
        .color-select-wrap::after {
            content: '▾';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            font-size: 12px;
        }

        .repeat-select-wrap {
            margin-bottom: 12px;
        }
        .repeat-select-wrap select.field {
            margin-bottom: 0;
        }

        .field-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
            display: block;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), #a8751e);
            border: none;
            border-radius: 14px;
            padding: 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--ink);
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: opacity 0.2s, box-shadow 0.2s;
            margin-top: 4px;
        }
        .btn-primary:hover { opacity: 0.88; box-shadow: 0 6px 24px rgba(201,168,76,0.3); }

        .btn-ghost {
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
            transition: color 0.2s;
            width: 100%;
            padding: 8px;
            border-radius: 10px;
        }
        .btn-ghost:hover { color: var(--silver); background: rgba(255,255,255,0.04); }

        .btn-danger {
            background: rgba(224,85,85,0.12);
            border: 1px solid rgba(224,85,85,0.25);
            border-radius: 14px;
            padding: 11px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--danger);
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-danger:hover { background: rgba(224,85,85,0.22); border-color: rgba(224,85,85,0.5); }

        /* ── Entrance animations ── */
        .fade-up {
            opacity: 0;
            transform: translateY(16px);
            animation: fade-up 0.6s ease forwards;
        }
        @keyframes fade-up {
            to { opacity: 1; transform: translateY(0); }
        }
        .delay-1 { animation-delay: 0.08s; }
        .delay-2 { animation-delay: 0.16s; }
        .delay-3 { animation-delay: 0.24s; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.35); }

        @media (max-width: 768px) {
            .sidebar { width: 260px; min-width: 260px; }
        }
        @media (max-width: 600px) {
            .calendar-container { flex-direction: column; }
            .sidebar { width: 100%; min-width: unset; height: auto; overflow: visible; }
            .main { flex: 1; overflow: auto; }
        }
    </style>
</head>
<body>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <div class="ambient ambient-1" aria-hidden="true"></div>
    <div class="ambient ambient-2" aria-hidden="true"></div>
    <div class="ambient ambient-3" aria-hidden="true"></div>

    <div class="calendar-container">
        <!-- Sidebar -->
        <aside class="sidebar" role="complementary" aria-label="Calendar navigation">
            <a href="https://wizardecosystem.dpdns.org" class="logo" aria-label="Wizard Ecosystem home">
                <span class="logo-icon" aria-hidden="true">📅</span>
                <span class="logo-text">Wizard <em>Calendar</em></span>
            </a>

            <div class="user-card fade-up" role="status">
                <div class="user-avatar" aria-hidden="true">🧙</div>
                <span id="user-email" class="user-email">Loading…</span>
            </div>

            <div class="month-navigator fade-up delay-1" aria-label="Mini calendar">
                <div class="month-nav-header">
                    <button class="mini-nav-btn" id="mini-prev-month" aria-label="Previous month">←</button>
                    <span id="mini-current-month" class="mini-month-label"></span>
                    <button class="mini-nav-btn" id="mini-next-month" aria-label="Next month">→</button>
                </div>
                <div class="mini-calendar-grid" id="mini-calendar-grid" role="grid" aria-label="Mini month calendar"></div>
            </div>

            <button class="create-btn fade-up delay-2" id="create-btn" aria-label="Create new event">✦ Create Event</button>

            <div class="sidebar-footer fade-up delay-3">
                <a href="https://wizardecosystem.dpdns.org" class="back-link">← Back to Ecosystem</a>
            </div>
        </aside>

        <!-- Main -->
        <main class="main" role="main">
            <div class="calendar-header">
                <div class="header-left">
                    <button class="month-nav-btn" id="prev-month" aria-label="Previous month">←</button>
                    <h1 id="current-month" class="current-month-title"></h1>
                    <button class="month-nav-btn" id="next-month" aria-label="Next month">→</button>
                </div>
                <div class="view-buttons" role="group" aria-label="Calendar view">
                    <button class="view-btn active" data-view="month">Month</button>
                    <button class="view-btn" data-view="week">Week</button>
                </div>
            </div>

            <div id="month-view" class="month-view" role="grid" aria-label="Monthly calendar"></div>
            <div id="week-view" class="week-view" role="grid" aria-label="Weekly calendar"></div>
        </main>
    </div>

    <!-- Event Modal -->
    <div id="event-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-box">
            <span class="modal-glyph" aria-hidden="true">📅</span>
            <h2 class="modal-title" id="modal-title">New Event</h2>

            <label class="field-label" for="event-title">Event title</label>
            <input class="field" type="text" id="event-title" placeholder="Name your event…" autocomplete="off">

            <div class="field-row">
                <div>
                    <label class="field-label" for="event-start">Starts</label>
                    <input class="field" type="datetime-local" id="event-start">
                </div>
                <div>
                    <label class="field-label" for="event-end">Ends</label>
                    <input class="field" type="datetime-local" id="event-end">
                </div>
            </div>

            <label class="field-label" for="event-color">Color</label>
            <div class="color-select-wrap">
                <select class="field" id="event-color">
                    <option value="gold">✦ Gold</option>
                    <option value="violet">✦ Violet</option>
                    <option value="blue">✦ Blue</option>
                    <option value="green">✦ Green</option>
                    <option value="red">✦ Red</option>
                </select>
            </div>

            <label class="field-label" for="repeat">Repeat</label>
            <div class="repeat-select-wrap">
                <select class="field" id="repeat">
                    <option value="none">Does not repeat</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>

            <label class="field-label" for="event-desc">Description</label>
            <textarea class="field" id="event-desc" placeholder="Optional notes…"></textarea>

            <button class="btn-primary" id="save-event">Save Event</button>
            <button class="btn-danger" id="delete-event" style="display:none;">Delete Event</button>
            <button class="btn-ghost" id="close-modal">Cancel</button>
        </div>
    </div>

    <script>
        /* ── Starfield ── */
        (function() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];
            const N = 180;
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);
            for (let i = 0; i < N; i++) {
                stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.2 + 0.2, a: Math.random(), speed: Math.random() * 0.0005 + 0.0002 });
            }
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const t = Date.now() / 1000;
                stars.forEach(s => {
                    const alpha = 0.3 + 0.5 * Math.sin(t * s.speed * 6000 + s.a * 100);
                    ctx.beginPath();
                    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(212,208,232,${alpha})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        /* ── App Logic ── */
        const API_BASE = 'https://arnav0928.pythonanywhere.com';
        let currentUser = null, events = [], currentDate = new Date(), currentView = 'month', editingId = null;

        const COLOR_MAP = {
            gold:   '#c9a84c',
            violet: '#7c5cbf',
            blue:   '#4a8fe8',
            green:  '#5cb87a',
            red:    '#e05555'
        };

        function getColor(c) { return COLOR_MAP[c] || COLOR_MAP.gold; }
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        // Generate recurring event dates
        function generateRecurringDates(startDate, repeat, occurrences = 12) {
            const dates = [new Date(startDate)];
            if (repeat === 'none') return dates;
            
            const start = new Date(startDate);
            for (let i = 1; i < occurrences; i++) {
                const next = new Date(start);
                switch(repeat) {
                    case 'daily':
                        next.setDate(start.getDate() + i);
                        break;
                    case 'weekly':
                        next.setDate(start.getDate() + (i * 7));
                        break;
                    case 'monthly':
                        next.setMonth(start.getMonth() + i);
                        break;
                    case 'yearly':
                        next.setFullYear(start.getFullYear() + i);
                        break;
                }
                dates.push(next);
            }
            return dates;
        }

        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/api/check-auth`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated && data.user) {
                        currentUser = data.user;
                        document.getElementById('user-email').textContent = currentUser.email;
                        await loadEvents();
                        renderAll();
                        return;
                    }
                }
            } catch(e) {}
            window.location.href = 'https://wizardecosystem.dpdns.org';
        }

        async function loadEvents() {
            try {
                const res = await fetch(`${API_BASE}/api/calendar/events`, { credentials: 'include' });
                if (res.ok) { const data = await res.json(); events = data.events || []; }
            } catch(e) {}
        }

        async function saveEvent(eventData) {
            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? `${API_BASE}/api/calendar/events/${editingId}` : `${API_BASE}/api/calendar/events`;
            
            // Handle recurring events
            const repeat = eventData.repeat || 'none';
            if (repeat !== 'none' && !editingId) {
                // Create multiple events for recurring
                const startDate = new Date(eventData.start);
                const endDate = new Date(eventData.end);
                const duration = endDate - startDate;
                const recurringDates = generateRecurringDates(startDate, repeat, 12);
                
                let success = true;
                for (const date of recurringDates) {
                    const newEnd = new Date(date.getTime() + duration);
                    const singleEvent = {
                        title: eventData.title,
                        start: date.toISOString(),
                        end: newEnd.toISOString(),
                        description: eventData.description,
                        color: eventData.color,
                        repeat: repeat
                    };
                    const res = await fetch(`${API_BASE}/api/calendar/events`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify(singleEvent)
                    });
                    if (!res.ok) success = false;
                }
                if (success) { await loadEvents(); renderAll(); return true; }
                return false;
            }
            
            try {
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(eventData) });
                if (res.ok) { await loadEvents(); renderAll(); return true; }
            } catch(e) {}
            return false;
        }

        async function deleteEvent() {
            if (!editingId || !confirm('Delete this event?')) return false;
            
            // Check if it's a recurring event
            const event = events.find(e => e.id === editingId);
            if (event && event.repeat && event.repeat !== 'none') {
                const deleteAll = confirm('This is a recurring event. Delete all occurrences?');
                if (deleteAll) {
                    // Delete all events with same title and repeat pattern
                    for (const e of events) {
                        if (e.title === event.title && e.repeat === event.repeat) {
                            await fetch(`${API_BASE}/api/calendar/events/${e.id}`, { method: 'DELETE', credentials: 'include' });
                        }
                    }
                    await loadEvents();
                    renderAll();
                    closeModal();
                    return true;
                }
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/calendar/events/${editingId}`, { method: 'DELETE', credentials: 'include' });
                if (res.ok) { await loadEvents(); renderAll(); closeModal(); return true; }
            } catch(e) {}
            return false;
        }

        function renderAll() {
            const label = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const [month, year] = [
                currentDate.toLocaleString('default', { month: 'long' }),
                currentDate.getFullYear()
            ];
            document.getElementById('current-month').innerHTML = `${month} <em>${year}</em>`;
            renderMonthView();
            renderMiniCalendar();
        }

        function renderMonthView() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            let html = '';

            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
                html += `<div class="month-day-header">${d}</div>`;
            });

            for (let i = 0; i < firstDay; i++) html += `<div class="month-day-cell other-month"></div>`;

            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month, d);
                const isToday = date.toDateString() === today.toDateString();
                const dayEvents = events.filter(e => new Date(e.start).toDateString() === date.toDateString());
                html += `<div class="month-day-cell ${isToday ? 'today' : ''}" data-year="${year}" data-month="${month}" data-day="${d}" role="gridcell" tabindex="0" aria-label="${date.toDateString()}">
                    <span class="day-number">${d}</span>`;
                dayEvents.forEach(ev => {
                    html += `<div class="event-pill" data-event-id="${ev.id}" role="button" tabindex="0" aria-label="${escapeHtml(ev.title)}">
                        <span class="event-dot" style="background:${getColor(ev.color)};"></span>${escapeHtml(ev.title)}
                    </div>`;
                });
                html += `</div>`;
            }

            const remaining = 42 - (firstDay + daysInMonth);
            for (let i = 0; i < remaining; i++) html += `<div class="month-day-cell other-month"></div>`;

            document.getElementById('month-view').innerHTML = html;

            document.querySelectorAll('.month-day-cell:not(.other-month)').forEach(cell => {
                cell.addEventListener('click', e => {
                    if (!e.target.closest('.event-pill')) {
                        const y = parseInt(cell.dataset.year), m = parseInt(cell.dataset.month), d = parseInt(cell.dataset.day);
                        if (y && d >= 0) openCreateModal(new Date(y, m, d), 9);
                    }
                });
                cell.addEventListener('keydown', e => {
                    if (e.key === 'Enter') cell.click();
                });
            });
            document.querySelectorAll('.event-pill').forEach(el => {
                el.addEventListener('click', e => { e.stopPropagation(); openEditModal(parseInt(el.dataset.eventId)); });
                el.addEventListener('keydown', e => { if (e.key === 'Enter') el.click(); });
            });
        }

        function renderMiniCalendar() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            let html = '';

            ['S','M','T','W','T','F','S'].forEach(d => { html += `<div class="mini-weekday">${d}</div>`; });
            for (let i = 0; i < firstDay; i++) html += `<div class="mini-day other-month"></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month, d);
                const isToday = date.toDateString() === today.toDateString();
                const hasEvent = events.some(e => new Date(e.start).toDateString() === date.toDateString());
                html += `<div class="mini-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}" data-day="${d}" role="gridcell" tabindex="0" aria-label="${date.toDateString()}">${d}</div>`;
            }

            document.getElementById('mini-calendar-grid').innerHTML = html;
            document.getElementById('mini-current-month').textContent =
                currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

            document.querySelectorAll('.mini-day[data-day]').forEach(day => {
                day.addEventListener('click', () => {
                    currentDate = new Date(year, month, parseInt(day.dataset.day));
                    renderAll();
                });
            });
        }

        function openCreateModal(date, hour) {
            editingId = null;
            document.getElementById('modal-title').textContent = 'New Event';
            document.getElementById('delete-event').style.display = 'none';
            const start = new Date(date); start.setHours(hour, 0, 0, 0);
            const end = new Date(start); end.setHours(hour + 1, 0, 0, 0);
            document.getElementById('event-start').value = start.toISOString().slice(0, 16);
            document.getElementById('event-end').value = end.toISOString().slice(0, 16);
            document.getElementById('event-title').value = '';
            document.getElementById('event-desc').value = '';
            document.getElementById('event-color').value = 'gold';
            document.getElementById('repeat').value = 'none';
            document.getElementById('event-modal').classList.add('show');
        }

        function openEditModal(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;
            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Event';
            document.getElementById('delete-event').style.display = 'block';
            document.getElementById('event-title').value = event.title;
            document.getElementById('event-start').value = event.start.slice(0, 16);
            document.getElementById('event-end').value = event.end.slice(0, 16);
            document.getElementById('event-desc').value = event.description || '';
            document.getElementById('event-color').value = event.color || 'gold';
            document.getElementById('repeat').value = event.repeat || 'none';
            document.getElementById('event-modal').classList.add('show');
        }

        function closeModal() { document.getElementById('event-modal').classList.remove('show'); }

        document.getElementById('prev-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderAll(); };
        document.getElementById('next-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderAll(); };
        document.getElementById('mini-prev-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderAll(); };
        document.getElementById('mini-next-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderAll(); };
        document.getElementById('create-btn').onclick = () => openCreateModal(new Date(), 9);
        document.getElementById('close-modal').onclick = closeModal;
        document.getElementById('delete-event').onclick = deleteEvent;

        document.getElementById('event-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('save-event').onclick = async () => {
            const title = document.getElementById('event-title').value.trim();
            const start = document.getElementById('event-start').value;
            const end   = document.getElementById('event-end').value;
            const repeat = document.getElementById('repeat').value;
            if (!title || !start || !end) { alert('Please fill in all required fields.'); return; }
            const eventData = { 
                title, start, end, 
                description: document.getElementById('event-desc').value, 
                color: document.getElementById('event-color').value,
                repeat: repeat
            };
            if (await saveEvent(eventData)) closeModal();
            else alert('Failed to save event. Please try again.');
        };

        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                const monthEl = document.getElementById('month-view');
                const weekEl  = document.getElementById('week-view');
                if (currentView === 'month') {
                    monthEl.style.display = 'grid';
                    weekEl.classList.remove('active');
                } else {
                    monthEl.style.display = 'none';
                    weekEl.classList.add('active');
                    renderWeekView();
                }
            };
        });

        function renderWeekView() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth(), day = currentDate.getDate();
            const startOfWeek = new Date(year, month, day - currentDate.getDay());
            const today = new Date();
            const weekEl = document.getElementById('week-view');
            let html = `<div class="week-time-gutter">`;
            html += `<div class="time-label" style="height:42px;"></div>`;
            for (let h = 0; h < 24; h++) {
                html += `<div class="time-label">${h === 0 ? '12 AM' : h < 12 ? `${h} AM` : h === 12 ? '12 PM' : `${h-12} PM`}</div>`;
            }
            html += `</div>`;
            for (let col = 0; col < 7; col++) {
                const d = new Date(startOfWeek); d.setDate(startOfWeek.getDate() + col);
                const isToday = d.toDateString() === today.toDateString();
                const dayStr = d.toLocaleString('default', { weekday: 'short' });
                const dayNum = d.getDate();
                html += `<div class="week-day-col">
                    <div class="week-day-header ${isToday ? 'today-col' : ''}">${dayStr} ${dayNum}</div>`;
                for (let h = 0; h < 24; h++) {
                    const cellDate = new Date(d); cellDate.setHours(h, 0, 0, 0);
                    html += `<div class="week-hour-cell" data-ts="${cellDate.toISOString().slice(0,16)}"></div>`;
                }
                html += `</div>`;
            }
            weekEl.innerHTML = html;
            weekEl.querySelectorAll('.week-hour-cell').forEach(cell => {
                cell.onclick = () => {
                    const dt = new Date(cell.dataset.ts);
                    openCreateModal(dt, dt.getHours());
                };
            });
        }

        checkAuth();
    </script>
</body>
</html>
