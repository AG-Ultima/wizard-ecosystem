<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙 Wizard Calendar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a14;
            --bg-secondary: #0f0f1c;
            --bg-card: rgba(18,18,35,0.95);
            --text-primary: #ffffff;
            --text-secondary: #e0e0ff;
            --text-muted: #a0a0c0;
            --border: rgba(139,92,246,0.3);
            --primary: #a855f7;
            --primary-dark: #7c3aed;
            --primary-light: #c084fc;
            --success: #10b981;
            --danger: #ef4444;
            --event-purple: #a855f7;
            --event-blue: #3b82f6;
            --event-green: #10b981;
            --event-red: #ef4444;
            --event-yellow: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        .calendar-container { display: flex; height: 100vh; }
        
        /* Sidebar - Month Navigation */
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .logo-icon { font-size: 36px; }
        .logo h1 { font-size: 22px; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .user-info {
            background: rgba(139,92,246,0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .user-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 12px; }
        .user-email { font-size: 12px; color: var(--primary-light); word-break: break-all; }
        
        /* Month Navigator */
        .month-navigator {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .month-nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .month-nav-header button {
            background: rgba(139,92,246,0.2);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .month-nav-header button:hover { background: rgba(139,92,246,0.4); }
        .current-month-display {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-light);
        }
        
        /* Mini Calendar Grid */
        .mini-calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }
        .mini-weekday {
            font-size: 11px;
            color: var(--text-muted);
            padding: 6px;
            font-weight: 500;
        }
        .mini-day {
            padding: 8px 4px;
            font-size: 13px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .mini-day:hover { background: rgba(139,92,246,0.2); }
        .mini-day.today {
            background: var(--primary);
            color: white;
            font-weight: bold;
        }
        .mini-day.has-event {
            background: rgba(168,85,247,0.3);
            font-weight: bold;
            position: relative;
        }
        .mini-day.has-event::after {
            content: '●';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 6px;
            color: var(--primary-light);
        }
        .mini-day.other-month { opacity: 0.4; }
        
        .create-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 24px;
            padding: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .create-btn:hover { transform: translateY(-2px); box-shadow: 0 0 15px var(--primary-glow); }
        
        /* Main Calendar Area - Month View */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .calendar-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .view-buttons { display: flex; gap: 8px; }
        .view-btn {
            background: rgba(139,92,246,0.15);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 13px;
        }
        .view-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: transparent;
        }
        
        /* Month View Grid */
        .month-view {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            overflow: auto;
        }
        .month-day-header {
            text-align: center;
            padding: 12px;
            font-weight: 600;
            color: var(--primary-light);
            border-bottom: 1px solid var(--border);
        }
        .month-day-cell {
            min-height: 100px;
            padding: 8px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            vertical-align: top;
            cursor: pointer;
            transition: all 0.2s;
        }
        .month-day-cell:hover { background: rgba(139,92,246,0.05); }
        .month-day-cell.today { background: rgba(168,85,247,0.1); }
        .day-number {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 20px;
        }
        .month-day-cell.today .day-number {
            background: var(--primary);
            color: white;
        }
        .event-in-month {
            background: rgba(168,85,247,0.2);
            border-radius: 6px;
            padding: 3px 6px;
            margin-bottom: 3px;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .event-in-month:hover { background: rgba(168,85,247,0.4); }
        
        /* Week View */
        .week-view {
            flex: 1;
            display: none;
            grid-template-columns: 80px repeat(7, 1fr);
            overflow: auto;
        }
        .week-view.active { display: grid; }
        .time-slot { height: 60px; border-bottom: 1px solid var(--border); padding: 4px; font-size: 11px; color: var(--text-muted); }
        .week-day-col { border-right: 1px solid var(--border); }
        .week-hour-cell { height: 60px; border-bottom: 1px solid var(--border); position: relative; cursor: pointer; }
        .week-hour-cell:hover { background: rgba(139,92,246,0.05); }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 32px;
            width: 450px;
            border: 1px solid var(--border);
        }
        .modal-card h3 { margin-bottom: 20px; color: var(--primary-light); }
        .modal-card input, .modal-card textarea, .modal-card select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            margin-bottom: 16px;
        }
        .modal-card textarea { height: 100px; resize: vertical; }
        .modal-card button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 24px;
            padding: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .event-details { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .loading { text-align: center; padding: 60px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="sidebar">
            <div class="logo"><span class="logo-icon">📅</span><h1>Wizard Calendar</h1></div>
            <div class="user-info"><div class="user-avatar">🧙</div><div id="user-email" class="user-email">Loading...</div></div>
            
            <!-- Month Navigator -->
            <div class="month-navigator">
                <div class="month-nav-header">
                    <button id="mini-prev-month">←</button>
                    <span id="mini-current-month" class="current-month-display">April 2026</span>
                    <button id="mini-next-month">→</button>
                </div>
                <div class="mini-calendar-grid" id="mini-calendar-grid"></div>
            </div>
            
            <button class="create-btn" id="create-btn">+ Create Event</button>
        </div>
        
        <div class="main">
            <div class="calendar-header">
                <div class="month-nav">
                    <button id="prev-month">←</button>
                    <h2 id="current-month">April 2026</h2>
                    <button id="next-month">→</button>
                </div>
                <div class="view-buttons">
                    <button class="view-btn active" data-view="month">Month</button>
                    <button class="view-btn" data-view="week">Week</button>
                </div>
            </div>
            
            <div id="month-view" class="month-view"></div>
            <div id="week-view" class="week-view"></div>
        </div>
    </div>
    
    <div id="event-modal" class="modal">
        <div class="modal-card">
            <h3 id="modal-title">New Event</h3>
            <input type="text" id="event-title" placeholder="Event title">
            <input type="datetime-local" id="event-start">
            <input type="datetime-local" id="event-end">
            <select id="event-color">
                <option value="purple">💜 Purple</option>
                <option value="blue">💙 Blue</option>
                <option value="green">💚 Green</option>
                <option value="red">❤️ Red</option>
                <option value="yellow">💛 Yellow</option>
            </select>
            <textarea id="event-desc" placeholder="Description (optional)"></textarea>
            <button id="save-event">Save</button>
            <button id="delete-event" style="margin-top: 12px; background: rgba(239,68,68,0.2); color: var(--danger); display: none;">Delete</button>
            <button id="close-modal" style="margin-top: 12px; background: rgba(139,92,246,0.2);">Cancel</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://arnav0928.pythonanywhere.com';
        let currentUser = null, events = [], currentDate = new Date(), currentView = 'month', editingId = null;
        
        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/api/check-auth`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated && data.user) {
                        currentUser = data.user;
                        document.getElementById('user-email').textContent = currentUser.email;
                        await loadEvents();
                        renderAll();
                        return;
                    }
                }
            } catch(e) {}
            window.location.href = 'https://wizardecosystem.dpdns.org';
        }
        
        async function loadEvents() {
            try {
                const res = await fetch(`${API_BASE}/api/calendar/events`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    events = data.events || [];
                    renderAll();
                }
            } catch(e) {}
        }
        
        async function saveEvent(eventData) {
            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? `${API_BASE}/api/calendar/events/${editingId}` : `${API_BASE}/api/calendar/events`;
            try {
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(eventData) });
                if (res.ok) { await loadEvents(); return true; }
            } catch(e) {}
            return false;
        }
        
        async function deleteEvent() {
            if (!editingId) return;
            if (!confirm('Delete this event?')) return;
            try {
                const res = await fetch(`${API_BASE}/api/calendar/events/${editingId}`, { method: 'DELETE', credentials: 'include' });
                if (res.ok) { await loadEvents(); document.getElementById('event-modal').classList.remove('show'); return true; }
            } catch(e) {}
            return false;
        }
        
        function renderAll() {
            renderMonthView();
            renderMiniCalendar();
            document.getElementById('current-month').textContent = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        }
        
        function renderMonthView() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            let html = '';
            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdays.forEach(d => { html += `<div class="month-day-header">${d}</div>`; });
            
            for (let i = 0; i < firstDay; i++) { html += `<div class="month-day-cell other-month"></div>`; }
            
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month, d);
                const isToday = date.toDateString() === today.toDateString();
                const dayEvents = events.filter(e => new Date(e.start).toDateString() === date.toDateString());
                
                html += `<div class="month-day-cell ${isToday ? 'today' : ''}" data-year="${year}" data-month="${month}" data-day="${d}">
                    <span class="day-number">${d}</span>`;
                dayEvents.forEach(event => {
                    html += `<div class="event-in-month" data-event-id="${event.id}" style="border-left: 3px solid ${getColor(event.color)};">
                        ${escapeHtml(event.title)}
                    </div>`;
                });
                html += `</div>`;
            }
            
            const remaining = (42 - (firstDay + daysInMonth));
            for (let i = 0; i < remaining; i++) { html += `<div class="month-day-cell other-month"></div>`; }
            
            document.getElementById('month-view').innerHTML = html;
            
            document.querySelectorAll('.month-day-cell').forEach(cell => {
                cell.onclick = (e) => {
                    if (!e.target.classList.contains('event-in-month')) {
                        const year = parseInt(cell.dataset.year);
                        const month = parseInt(cell.dataset.month);
                        const day = parseInt(cell.dataset.day);
                        if (year && month && day) openCreateModal(new Date(year, month, day), 9);
                    }
                };
            });
            document.querySelectorAll('.event-in-month').forEach(el => {
                el.onclick = (e) => { e.stopPropagation(); openEditModal(parseInt(el.dataset.eventId)); };
            });
        }
        
        function renderMiniCalendar() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            let html = `<div class="mini-calendar-grid">`;
            ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(d => { html += `<div class="mini-weekday">${d}</div>`; });
            
            for (let i = 0; i < firstDay; i++) { html += `<div class="mini-day other-month"></div>`; }
            
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month, d);
                const isToday = date.toDateString() === today.toDateString();
                const hasEvent = events.some(e => new Date(e.start).toDateString() === date.toDateString());
                html += `<div class="mini-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}" data-day="${d}">${d}</div>`;
            }
            html += `</div>`;
            document.getElementById('mini-calendar-grid').innerHTML = html;
            document.getElementById('mini-current-month').textContent = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            
            document.querySelectorAll('.mini-day[data-day]').forEach(day => {
                day.onclick = () => {
                    currentDate = new Date(year, month, parseInt(day.dataset.day));
                    renderAll();
                };
            });
        }
        
        function getColor(color) {
            const colors = { purple: '#a855f7', blue: '#3b82f6', green: '#10b981', red: '#ef4444', yellow: '#f59e0b' };
            return colors[color] || colors.purple;
        }
        
        function openCreateModal(date, hour) {
            editingId = null;
            document.getElementById('modal-title').textContent = 'New Event';
            document.getElementById('delete-event').style.display = 'none';
            const start = new Date(date); start.setHours(hour, 0, 0);
            const end = new Date(start); end.setHours(hour + 1, 0, 0);
            document.getElementById('event-start').value = start.toISOString().slice(0, 16);
            document.getElementById('event-end').value = end.toISOString().slice(0, 16);
            document.getElementById('event-title').value = '';
            document.getElementById('event-desc').value = '';
            document.getElementById('event-color').value = 'purple';
            document.getElementById('event-modal').classList.add('show');
        }
        
        function openEditModal(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;
            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Event';
            document.getElementById('delete-event').style.display = 'block';
            document.getElementById('event-title').value = event.title;
            document.getElementById('event-start').value = event.start.slice(0, 16);
            document.getElementById('event-end').value = event.end.slice(0, 16);
            document.getElementById('event-desc').value = event.description || '';
            document.getElementById('event-color').value = event.color || 'purple';
            document.getElementById('event-modal').classList.add('show');
        }
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        document.getElementById('prev-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderAll(); };
        document.getElementById('next-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderAll(); };
        document.getElementById('mini-prev-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderAll(); };
        document.getElementById('mini-next-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderAll(); };
        document.getElementById('create-btn').onclick = () => openCreateModal(new Date(), 9);
        document.getElementById('save-event').onclick = async () => {
            const eventData = {
                title: document.getElementById('event-title').value,
                start: document.getElementById('event-start').value,
                end: document.getElementById('event-end').value,
                description: document.getElementById('event-desc').value,
                color: document.getElementById('event-color').value
            };
            if (!eventData.title || !eventData.start || !eventData.end) { alert('Fill all fields'); return; }
            if (await saveEvent(eventData)) document.getElementById('event-modal').classList.remove('show');
            else alert('Failed to save');
        };
        document.getElementById('delete-event').onclick = async () => { if (await deleteEvent()) document.getElementById('event-modal').classList.remove('show'); };
        document.getElementById('close-modal').onclick = () => document.getElementById('event-modal').classList.remove('show');
        
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                if (currentView === 'month') {
                    document.getElementById('month-view').style.display = 'grid';
                    document.getElementById('week-view').classList.remove('active');
                } else {
                    document.getElementById('month-view').style.display = 'none';
                    document.getElementById('week-view').classList.add('active');
                }
            };
        });
        
        checkAuth();
    </script>
</body>
</html>
