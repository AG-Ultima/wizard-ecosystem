<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙 Wizard Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a14;
            --bg-secondary: #0f0f1c;
            --bg-card: rgba(18,18,35,0.95);
            --text-primary: #ffffff;
            --text-secondary: #e0e0ff;
            --text-muted: #a0a0c0;
            --border: rgba(139,92,246,0.3);
            --primary: #a855f7;
            --primary-dark: #7c3aed;
            --primary-light: #c084fc;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        .chat-container { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 340px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .header { padding: 24px; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .logo-icon { font-size: 36px; }
        .logo h1 { font-size: 22px; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .user-info {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; background: rgba(139,92,246,0.1);
            border-radius: 16px; margin-bottom: 20px;
        }
        .user-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .user-name { font-weight: 600; }
        .user-email { font-size: 11px; color: var(--text-muted); }
        
        .new-chat-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 24px; padding: 12px;
            color: white; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .new-chat-btn:hover { transform: translateY(-2px); box-shadow: 0 0 15px var(--primary-glow); }
        
        .conv-list { flex: 1; overflow-y: auto; padding: 12px; }
        .conv-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-radius: 16px; cursor: pointer;
            margin-bottom: 4px; transition: all 0.2s;
        }
        .conv-item:hover { background: rgba(139,92,246,0.1); }
        .conv-item.active { background: rgba(139,92,246,0.2); border-left: 3px solid var(--primary); }
        .conv-avatar {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .conv-info { flex: 1; }
        .conv-name { font-weight: 600; margin-bottom: 4px; }
        .conv-last-msg { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-time { font-size: 10px; color: var(--text-muted); }
        
        /* Chat Area */
        .chat-area {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .chat-avatar {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .chat-name { font-weight: 600; font-size: 18px; }
        .chat-status { font-size: 12px; color: var(--text-muted); }
        
        .messages-area {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .message {
            display: flex; gap: 12px; max-width: 70%;
            animation: fadeIn 0.3s ease;
        }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .message.own .msg-avatar { background: var(--success); }
        .msg-bubble {
            background: rgba(139,92,246,0.15);
            border-radius: 18px; padding: 10px 16px;
            font-size: 14px; line-height: 1.5;
        }
        .message.own .msg-bubble {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        .msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
        .message.own .msg-time { text-align: right; }
        
        .input-area {
            padding: 16px 20px; border-top: 1px solid var(--border);
            display: flex; gap: 12px;
        }
        .message-input {
            flex: 1; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 12px 18px; color: white; resize: none;
            font-family: inherit; font-size: 14px;
        }
        .message-input:focus { outline: none; border-color: var(--primary); }
        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 24px; padding: 0 24px;
            color: white; font-weight: 600; cursor: pointer;
        }
        
        /* New Chat Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-card {
            background: var(--bg-secondary); border-radius: 24px;
            padding: 32px; width: 400px; border: 1px solid var(--border);
        }
        .modal-card h3 { margin-bottom: 20px; color: var(--primary-light); }
        .modal-card input {
            width: 100%; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 12px; color: white; margin-bottom: 16px;
        }
        .modal-card button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 24px; padding: 12px;
            color: white; font-weight: 600; cursor: pointer;
            width: 100%;
        }
        .search-result {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-radius: 12px; cursor: pointer;
        }
        .search-result:hover { background: rgba(139,92,246,0.1); }
        .empty-state { text-align: center; padding: 60px; color: var(--text-muted); }
        .empty-icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="header">
                <div class="logo"><span class="logo-icon">💬</span><h1>Wizard Chat</h1></div>
                <div class="user-info">
                    <div class="user-avatar">🧙</div>
                    <div>
                        <div class="user-name" id="user-name">Loading...</div>
                        <div class="user-email" id="user-email">Loading...</div>
                    </div>
                </div>
                <button class="new-chat-btn" id="new-chat-btn">+ New Chat</button>
            </div>
            <div class="conv-list" id="conv-list">
                <div class="empty-state"><div class="empty-icon">💬</div><p>No conversations yet</p><p style="font-size: 12px;">Click "New Chat" to start</p></div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-avatar" id="chat-avatar">🧙</div>
                <div>
                    <div class="chat-name" id="chat-name">Select a chat</div>
                    <div class="chat-status" id="chat-status">Click a conversation to start</div>
                </div>
            </div>
            <div class="messages-area" id="messages-area">
                <div class="empty-state"><div class="empty-icon">💬</div><p>Select a conversation to start messaging</p></div>
            </div>
            <div class="input-area">
                <textarea class="message-input" id="message-input" placeholder="Type a message..." rows="1"></textarea>
                <button class="send-btn" id="send-btn">Send</button>
            </div>
        </div>
    </div>
    
    <div id="new-chat-modal" class="modal">
        <div class="modal-card">
            <h3>Start a New Chat</h3>
            <input type="text" id="search-users" placeholder="Search by email or name...">
            <div id="search-results" class="search-results"></div>
            <button id="close-modal" style="margin-top: 16px; background: rgba(139,92,246,0.2);">Cancel</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://arnav0928.pythonanywhere.com';
        let currentUser = null, conversations = [], currentConvId = null, messages = [], polling = null;
        
        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/api/check-auth`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated && data.user) {
                        currentUser = data.user;
                        document.getElementById('user-name').textContent = `${currentUser.first_name || ''} ${currentUser.last_name || ''}`.trim() || currentUser.email;
                        document.getElementById('user-email').textContent = currentUser.email;
                        await loadConversations();
                        startPolling();
                        return;
                    }
                }
            } catch(e) {}
            window.location.href = 'https://wizardecosystem.dpdns.org';
        }
        
        async function loadConversations() {
            try {
                const res = await fetch(`${API_BASE}/api/chat/conversations`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    conversations = data.conversations || [];
                    renderConversations();
                }
            } catch(e) {}
        }
        
        async function loadMessages(convId) {
            try {
                const res = await fetch(`${API_BASE}/api/chat/messages/${convId}`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    messages = data.messages || [];
                    renderMessages();
                }
            } catch(e) {}
        }
        
        async function sendMessage() {
            const content = document.getElementById('message-input').value.trim();
            if (!content || !currentConvId) return;
            try {
                const res = await fetch(`${API_BASE}/api/chat/messages`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                    body: JSON.stringify({ conversation_id: currentConvId, content })
                });
                if (res.ok) {
                    document.getElementById('message-input').value = '';
                    await loadMessages(currentConvId);
                    await loadConversations();
                }
            } catch(e) {}
        }
        
        async function createConversation(userId) {
            try {
                const res = await fetch(`${API_BASE}/api/chat/conversations`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                    body: JSON.stringify({ participant_id: userId })
                });
                if (res.ok) {
                    const data = await res.json();
                    await loadConversations();
                    openConversation(data.conversation.id);
                    document.getElementById('new-chat-modal').classList.remove('show');
                    document.getElementById('search-users').value = '';
                }
            } catch(e) {}
        }
        
        async function searchUsers(query) {
            if (!query || query.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
            try {
                const res = await fetch(`${API_BASE}/api/chat/users/search?q=${encodeURIComponent(query)}`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    renderSearchResults(data.users);
                }
            } catch(e) {}
        }
        
        function renderConversations() {
            const container = document.getElementById('conv-list');
            if (!conversations.length) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><p>No conversations yet</p><p style="font-size: 12px;">Click "New Chat" to start</p></div>';
                return;
            }
            container.innerHTML = conversations.map(c => `
                <div class="conv-item ${currentConvId === c.id ? 'active' : ''}" data-id="${c.id}">
                    <div class="conv-avatar">👤</div>
                    <div class="conv-info">
                        <div class="conv-name">${escapeHtml(c.name)}</div>
                        <div class="conv-last-msg">${escapeHtml(c.last_message || 'No messages yet')}</div>
                    </div>
                    <div class="conv-time">${c.last_message_time ? formatTime(c.last_message_time) : ''}</div>
                </div>
            `).join('');
            document.querySelectorAll('.conv-item').forEach(item => {
                item.onclick = () => openConversation(parseInt(item.dataset.id));
            });
        }
        
        function renderMessages() {
            const container = document.getElementById('messages-area');
            if (!messages.length) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><p>No messages yet</p><p style="font-size: 12px;">Send a message to start!</p></div>';
                return;
            }
            container.innerHTML = messages.map(m => `
                <div class="message ${m.sender_id === currentUser?.id ? 'own' : ''}">
                    <div class="msg-avatar">${m.sender_id === currentUser?.id ? '👤' : '🧙'}</div>
                    <div>
                        <div class="msg-bubble">${escapeHtml(m.content)}</div>
                        <div class="msg-time">${formatTime(m.created_at)}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function renderSearchResults(users) {
            const container = document.getElementById('search-results');
            if (!users || !users.length) {
                container.innerHTML = '<div style="text-align:center;padding:20px;">No users found</div>';
                return;
            }
            container.innerHTML = users.map(u => `
                <div class="search-result" data-id="${u.id}">
                    <div class="conv-avatar" style="width:40px;height:40px;">👤</div>
                    <div>
                        <div style="font-weight:500;">${escapeHtml(u.name || u.email)}</div>
                        <div style="font-size:11px;color:var(--text-muted);">${escapeHtml(u.email)}</div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.search-result').forEach(r => {
                r.onclick = () => createConversation(parseInt(r.dataset.id));
            });
        }
        
        function openConversation(convId) {
            currentConvId = convId;
            const conv = conversations.find(c => c.id === convId);
            if (conv) {
                document.getElementById('chat-name').textContent = conv.name;
                document.getElementById('chat-avatar').textContent = conv.name.charAt(0);
            }
            loadMessages(convId);
            renderConversations();
        }
        
        function formatTime(ts) {
            const date = new Date(ts);
            const now = new Date();
            const diff = now - date;
            if (diff < 86400000) return date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            if (diff < 604800000) return date.toLocaleDateString([], { weekday:'short' });
            return date.toLocaleDateString([], { month:'short', day:'numeric' });
        }
        
        function startPolling() {
            if (polling) clearInterval(polling);
            polling = setInterval(async () => {
                await loadConversations();
                if (currentConvId) await loadMessages(currentConvId);
            }, 3000);
        }
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        document.getElementById('new-chat-btn').onclick = () => document.getElementById('new-chat-modal').classList.add('show');
        document.getElementById('close-modal').onclick = () => document.getElementById('new-chat-modal').classList.remove('show');
        document.getElementById('search-users').oninput = (e) => searchUsers(e.target.value);
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('message-input').onkeypress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        
        checkAuth();
    </script>
</body>
</html>
